<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VLVD 시즌 준비 운영 캘린더</title>
<style>
  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f4f6f9;
    --color-bg-tertiary: #eceff4;
    --color-border: #dce1ea;
    --color-text: #1a1a18;
    --color-text-secondary: #6b6a64;
    --color-text-tertiary: #9b9a93;
    --color-info: #0c447c;
    --color-info-bg: #e6f1fb;
    --color-today-bg: #eef1f6;
    --sat-color: #2f6fbf;
    --sun-color: #d14343;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--color-bg-secondary);
    color: var(--color-text);
    padding: 8px 16px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
  }
  .layout {
    max-width: 100%;
    width: 100%;
    margin: 0;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .main-col { flex: 1; min-width: 0; }
  .side-col {
    width: 340px;
    flex-shrink: 0;
    position: sticky;
    top: 48px;
    margin-top: 4px;
  }
  .topbar {
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .topbar-title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .topbar-left h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
  .topbar-right-group { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .topbar-right { display: flex; gap: 8px; align-items: flex-end; }
  .topbar-bottom-row {
    display: flex; align-items: center; justify-content: flex-end;
    flex-wrap: wrap; gap: 12px;
  }
  button {
    font-family: inherit;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: var(--radius-md);
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
    color: var(--color-text);
  }
  button:hover { background: var(--color-bg-tertiary); }
  button.primary { background: var(--color-text); color: #fff; border-color: var(--color-text); }
  button.primary:hover { opacity: 0.85; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-right: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text-secondary); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .calendar-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    background: var(--color-bg);
    border-bottom: 2px solid var(--color-border);
  }
  .weekday-row div { text-align: center; padding: 12px 0; font-size: 17px; font-weight: 700; color: var(--color-text-secondary); }
  .weekday-row div.sun { color: var(--sun-color); }
  .weekday-row div.sat { color: var(--sat-color); }
  .grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); }
  .cell {
    min-height: 150px;
    border-right: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
    padding: 10px;
    cursor: pointer;
    position: relative;
  }
  .cell.outside { background: var(--color-bg-secondary); cursor: default; }
  .cell.today { background: var(--color-bg); box-shadow: inset 0 0 0 2px #1a1a18; }
  .cell.selected { box-shadow: inset 0 0 0 2px #6ab04c; }
  .daynum { font-size: 17px; margin-bottom: 0; }
  .daynum.today { color: var(--color-text); font-weight: 600; }
  .daynum.sun { color: var(--sun-color); }
  .daynum.sat { color: var(--sat-color); }
  .holiday-name { font-size: 13px; color: var(--sun-color); margin-bottom:2px; }
  .event-card { border-radius: 5px; margin-bottom: 4px; padding: 4px 7px; cursor: pointer; display: flex; gap: 6px; align-items: flex-start; position: relative; overflow: visible; }
  .event-card img.thumb { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; flex-shrink: 0; margin-top: 1px; }
  .event-text { overflow: hidden; min-width: 0; flex: 1; }
  .event-line1 { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  /* 호버 시 텍스트 확장 */
  .cell { position: relative; }

  /* ---------- 사이드 패널 ---------- */
  .panel {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 18px;
    max-height: calc(100vh - 96px);
    overflow-y: auto;
  }
  .panel-empty { font-size: 15px; color: var(--color-text-tertiary); text-align: center; padding: 40px 10px; }
  .panel-date { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .panel-subtitle { font-size: 14px; color: var(--color-text-tertiary); margin-bottom: 14px; }
  .panel-add-btn { width: 100%; margin-bottom: 14px; }
  .panel-list-item {
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    padding: 8px 10px; margin-bottom: 8px; cursor: pointer;
  }
  .panel-list-item:hover { background: var(--color-bg-secondary); }
  .panel-list-item.active { border-color: var(--color-text); }
  .panel-list-cat { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .panel-list-main { font-size: 15px; }
  .panel-list-variant-wrap { margin-top: 6px; }
  .panel-variant-table { border-collapse: collapse; width: 100%; font-size: 13px; color: var(--color-text-secondary); }
  .panel-variant-table th { border: 1px solid var(--color-border); padding: 3px 6px; background: var(--color-bg-tertiary); color: var(--color-text-secondary); font-weight: 500; }
  .panel-variant-table td { border: 1px solid var(--color-border); padding: 3px 6px; text-align: center; background: var(--color-bg); }
  .panel-variant-table td.pvt-color { font-weight: 500; color: var(--color-text); background: var(--color-bg-secondary); }
  .panel-list-variant { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
  .panel-back-btn { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 12px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; border: none; background: none; padding: 0; }
  .panel-back-btn:hover { color: var(--color-text); background: none; }

  h2.panel-title { font-size: 18px; font-weight: 600; margin: 0 0 12px; }
  .cat-row { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: nowrap; overflow-x: auto; }
  .cat-btn { padding: 4px 7px; font-size: 13px; border-radius: var(--radius-md); border: 1px solid var(--color-border); background: var(--color-bg); cursor: pointer; white-space: nowrap; }
  .field-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field { margin-bottom: 10px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 7px 9px; border: 1px solid var(--color-border); border-radius: var(--radius-md);
    font-size: 15px; font-family: inherit; background: var(--color-bg); color: var(--color-text);
  }
  .variant-row { display: grid; grid-template-columns: 1fr 1fr 0.8fr 0.8fr 26px; gap: 5px; margin-bottom: 6px; align-items: center; }
  .variant-row input { padding: 6px 6px; font-size: 14px; min-width: 0; }
  .icon-btn { width: 26px; height: 26px; display:flex; align-items:center; justify-content:center; border:1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); cursor: pointer; flex-shrink: 0; padding: 0; }
  .icon-btn:disabled { opacity: 0.4; cursor: default; }
  .btn-row { display: flex; justify-content: space-between; margin-top: 16px; }
  .btn-row-right { display: flex; gap: 8px; }
  .danger { color: var(--sun-color); border-color: var(--sun-color); }
  .loading-text { font-size: 15px; color: var(--color-text-secondary); padding: 30px; text-align: center; }
  .spinner-inline { display:inline-block; width:12px; height:12px; border:2px solid var(--color-border); border-top-color: var(--color-text); border-radius:50%; animation: spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--color-text); color: #fff; padding: 10px 16px; border-radius: var(--radius-md); font-size: 15px; z-index: 100; }

  @media (max-width: 980px) {
    .layout { flex-direction: column; }
    .side-col { width: 100%; position: static; }
  }

  /* ---- 간트뷰 ---- */
  .gantt-wrap { overflow-x: auto; }
  .gantt-table { border-collapse: collapse; width: 100%; }
  .gantt-table th { background: var(--color-bg); border: 1px solid var(--color-border); padding: 6px 2px; font-size: 11px; font-weight: 700; text-align: center; color: var(--color-text-secondary); white-space: nowrap; min-width: 36px; }
  .gantt-table th.sun { color: var(--sun-color); }
  .gantt-table th.sat { color: var(--sat-color); }
  .gantt-table th.today-col { background: var(--color-bg-secondary); }
  .gantt-table th.label-head { min-width: 140px; text-align: left; padding-left: 10px; position: sticky; left: 0; z-index: 3; background: var(--color-bg); border-right: 2px solid var(--color-border); }
  .gantt-table td { border: 1px solid var(--color-border); padding: 0; height: 34px; position: relative; }
  .gantt-table td.label-cell { padding: 4px 10px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; min-width: 140px; background: var(--color-bg); position: sticky; left: 0; z-index: 1; border-right: 2px solid var(--color-border); }
  .gantt-table td.today-col { background: #f8f8f0; }
  .gantt-bar { position: absolute; top: 5px; bottom: 5px; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: 600; }
  .gantt-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; border-radius: 50%; cursor: pointer; }
  .gantt-section-row td { background: var(--color-bg-secondary) !important; font-size: 11px; font-weight: 700; color: var(--color-text-secondary); padding: 3px 10px; }
</style>
</head>
<body>
<div class="layout">
  <div class="main-col">
    <div class="topbar">
      <div class="topbar-title-row">
        <div class="topbar-left">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h1 style="margin:0;display:flex;align-items:center;gap:4px;font-size:28px;font-weight:700;letter-spacing:-0.5px;white-space:nowrap;">
              <select id="year-select" style="font-family:inherit;font-size:28px;font-weight:700;letter-spacing:-0.5px;border:none;background:transparent;cursor:pointer;color:var(--color-text);padding:0 2px;appearance:auto;"></select>
              <select id="month-select" style="font-family:inherit;font-size:28px;font-weight:700;letter-spacing:-0.5px;border:none;background:transparent;cursor:pointer;color:var(--color-text);padding:0 2px;appearance:auto;"></select>
            </h1>
            <input id="month-memo" type="text" placeholder="이달의 프로모션 / 이벤트 메모..."
              style="font-family:inherit;font-size:20px;font-weight:700;color:var(--color-text);border:none;border-bottom:1.5px solid var(--color-border);background:transparent;padding:4px 2px;width:300px;outline:none;"
              onfocus="this.style.borderBottomColor='var(--color-text)'"
              onblur="this.style.borderBottomColor='var(--color-border)'" />
          </div>
        </div>
        <div class="topbar-right">
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#39FF14;"></span>중요일정</div>
            <div class="legend-item"><span class="dot" style="background:#E4E212;"></span>운영</div>
            <div class="legend-item"><span class="dot" style="background:#E24B4A;"></span>상품</div>
            <div class="legend-item"><span class="dot" style="background:#43A047;"></span>커머스</div>
            <div class="legend-item"><span class="dot" style="background:#1E88E5;"></span>컨텐츠</div>
          </div>
          <button id="prev-btn">&#9666;</button>
          <button id="today-btn">오늘</button>
          <button id="next-btn">&#9656;</button>
          <button id="refresh-btn">새로고침</button>
          <button id="view-toggle-btn" style="border-color:var(--color-info);color:var(--color-info);">간트뷰</button>
        </div>
      </div>
    </div>

    <div class="calendar-card">
      <div class="weekday-row" id="weekday-row"></div>
      <div class="grid" id="grid">

      </div>
    </div>
  </div>

  <div class="side-col">
    <div class="panel" id="member-panel" style="margin-bottom:12px;">
      <div id="member-panel-content"></div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-empty">날짜를 클릭하면 그날의 일정이 여기에 표시됩니다.</div>
    </div>
  </div>
</div>

<div id="toast-root"></div>


<script>
var API_URL = "https://script.google.com/macros/s/AKfycbw7isRxme_nzrVS-hQf_IttVR04o2tfSmyFPx_9qrtPAmImot1c_ZmO50LV5lkOLxuj8A/exec";

var CATS = {
  important:   { label: "중요일정", color: "#39FF14", bg: "#C8FFB0", text: "#1A6600" },
  production:  { label: "메인",     color: "#E24B4A", bg: "#FFCCCC", text: "#791F1F", text2: "#A32D2D" },
  shoot:       { label: "샘플",     color: "#E24B4A", bg: "#FFCCCC", text: "#791F1F" },
  prodetc:     { label: "기타",     color: "#E24B4A", bg: "#FFCCCC", text: "#791F1F" },
  content:     { label: "컨텐츠",   color: "#1E88E5", bg: "#BBDEFB", text: "#0D47A1" },
  commerce:    { label: "커머스",   color: "#43A047", bg: "#C8E6C9", text: "#1B5E20" },
  team:        { label: "팀 일정",  color: "#E4E212", bg: "#F5F59A", text: "#3D3A00" },
  other:       { label: "타부서",   color: "#E4E212", bg: "#F5F59A", text: "#3D3A00" },
  opetc:       { label: "기타",     color: "#E4E212", bg: "#F5F59A", text: "#3D3A00" },
  leave:       { label: "연차",     color: "#EF9F27", bg: "#FFDDA0", text: "#633806" }
};

// 카테고리 그룹 구조
var GROUPS = [
  { key: "important", label: "중요일정", color: "#39FF14", bg: "#C8FFB0", text: "#1A6600", subCats: [] },
  { key: "operation", label: "운영",     color: "#E4E212", bg: "#F5F59A", text: "#3D3A00", subCats: ["team","other","opetc"] },
  { key: "product",   label: "상품",     color: "#E24B4A", bg: "#FFCCCC", text: "#791F1F", subCats: ["production","shoot","prodetc"] },
  { key: "commerce",  label: "커머스",   color: "#43A047", bg: "#C8E6C9", text: "#1B5E20", subCats: [] },
  { key: "content",   label: "컨텐츠",   color: "#1E88E5", bg: "#BBDEFB", text: "#0D47A1", subCats: [] }
];

function getGroupByCat(catKey){
  for(var i=0;i<GROUPS.length;i++){
    var g=GROUPS[i];
    if(g.subCats.length===0 && g.key===catKey) return g;
    if(g.subCats.indexOf(catKey)!==-1) return g;
  }
  return GROUPS[0];
}

var MEMBERS = {
  kevin: { label: "케빈",  color: "#8B9A46", bg: "#EBEBEA", text: "#3D4A00" },
  mendi: { label: "멘디",  color: "#FF7043", bg: "#EEECEA", text: "#7A2000" },
  alex:  { label: "알렉스", color: "#1565C0", bg: "#EAEBEE", text: "#0D47A1" },
  sena:  { label: "세나",  color: "#8E24AA", bg: "#EDEBEF", text: "#4A0060" },
  lion:  { label: "라이온", color: "#00ACC1", bg: "#E9ECEC", text: "#004D61" },
  jay:   { label: "제이",  color: "#FF1493", bg: "#EEEBEC", text: "#8B0057" }
};
function getStages(cat){
  return [
    { value: "instruct", label: "투입일" },
    { value: "expected", label: "입고 예정" },
    { value: "completed", label: "입고 완료" }
  ];
}

var today = new Date();
var view = { year: today.getFullYear(), month: today.getMonth() };
var events = [];
var holidays = {};
var selectedDate = null;
var eventLanes = {};
var currentView = "calendar";
var currentGanttYear = new Date().getFullYear();

var weekdayRow = document.getElementById("weekday-row");
var grid = document.getElementById("grid");
var panel = document.getElementById("panel");
var toastRoot = document.getElementById("toast-root");

["일","월","화","수","목","금","토"].forEach(function(d, i){
  var el = document.createElement("div");
  el.textContent = d;
  if (i === 0) el.className = "sun";
  if (i === 6) el.className = "sat";
  weekdayRow.appendChild(el);
});

function fmt(y,m,d){ return y + "-" + String(m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0"); }
function parseLeaveDesc(desc){
  if (!desc) return { type:"연차", dateEnd:"" };
  var parts = String(desc||"").split("||");
  return { type: parts[0]||"연차", dateEnd: parts[1]||"" };
}
function fmtDateKorean(dateStr){
  var d = new Date(dateStr + "T00:00:00");
  var wd = ["일","월","화","수","목","금","토"][d.getDay()];
  return d.getFullYear() + "년 " + (d.getMonth()+1) + "월 " + d.getDate() + "일 (" + wd + ")";
}
function showToast(msg){
  toastRoot.innerHTML = "";
  var t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  toastRoot.appendChild(t);
  setTimeout(function(){ toastRoot.innerHTML = ""; }, 2500);
}
function stageLabel(v, cat){
  if (v === "expected_p") return "파샬 예정";
  if (v === "completed_p") return "파샬 입고";
  var s = getStages(cat).find(function(s){ return s.value === v; });
  return s ? s.label : v;
}
function getBaseStage(stage){ return (stage==="expected_p"?"expected":(stage==="completed_p"?"completed":stage)); }
function isPartial(stage){ return stage==="expected_p"||stage==="completed_p"; }
function apiGet(action, extraParams){
  var url = API_URL + "?action=" + action;
  if (extraParams) Object.keys(extraParams).forEach(function(k){ url += "&" + k + "=" + encodeURIComponent(extraParams[k]); });
  return fetch(url).then(function(r){ return r.json(); });
}
function apiPost(body){
  return fetch(API_URL, { method: "POST", body: JSON.stringify(body) }).then(function(r){ return r.json(); });
}
var EVENTS_CACHE_KEY = "vlvd_events_cache";
var EVENTS_CACHE_TTL = 30 * 60 * 1000; // 30분

function loadEvents(){
  // 캐시 확인
  try {
    var cached = localStorage.getItem(EVENTS_CACHE_KEY);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < EVENTS_CACHE_TTL) {
        events = obj.data;
        return Promise.resolve(); // 캐시 히트 - 즉시 반환
      }
    }
  } catch(e) {}

  // 캐시 없거나 만료 - API 호출
  return apiGet("events").then(function(data){
    events = data.events || [];
    try {
      localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: events }));
    } catch(e) {}
  }).catch(function(err){
    // API 실패 시 만료된 캐시라도 사용
    try {
      var cached = localStorage.getItem(EVENTS_CACHE_KEY);
      if (cached) events = JSON.parse(cached).data || [];
    } catch(e) {}
    console.error(err);
  });
}

function clearEventsCache(){
  try { localStorage.removeItem(EVENTS_CACHE_KEY); } catch(e) {}
}
function loadHolidays(year, month){
  var hKey = "vlvd_holidays_" + year + "_" + (month+1);
  // 공휴일은 한 달간 캐시
  try {
    var cached = localStorage.getItem(hKey);
    if (cached) {
      var obj = JSON.parse(cached);
      obj.data.forEach(function(h){ holidays[h.date] = h.name; });
      return Promise.resolve();
    }
  } catch(e) {}

  return apiGet("holidays", { year: year, month: month + 1 }).then(function(data){
    var list = data.holidays || [];
    list.forEach(function(h){ holidays[h.date] = h.name; });
    try { localStorage.setItem(hKey, JSON.stringify({ data: list })); } catch(e) {}
  }).catch(function(){});
}
function buildCell(dateStr, dayLabel, isOutside){
  var cell = document.createElement("div");
  cell.className = "cell";
  if (isOutside){
    cell.className += " outside";
    cell.style.opacity = "0.45";
    // 날짜 번호
    var outsideNum = document.createElement("div");
    outsideNum.textContent = dayLabel;
    outsideNum.style.cssText = "font-size:15px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:400;";
    cell.appendChild(outsideNum);
    // 이벤트 표시 (dateStr이 있을 때만)
    if (dateStr) {

    bar.style.cssText="position:relative;left:"+leftOff+";width:"+barW+";height:"+BAR_H+"px;background:"+c.bg+";border-radius:"+brTL+" "+brTR+" "+brBR+" "+brBL+";margin-bottom:3px;overflow:"+barOverflow+";cursor:pointer;display:flex;align-items:center;padding:0 6px;"+(isFirst?"border-left:2px solid "+c.color+";":"")+"flex-shrink:0;box-sizing:border-box;";
      var sp = null;

        sp.textContent = fullSpTxt;
        bar.appendChild(sp);
      }
      (function(ev,ds){
      bar.addEventListener("click",function(e){ e.stopPropagation(); selectedDate=ds; render(); renderPanelList(ds); });
    })(activeEv,dateStr);
      cell.appendChild(bar);
    } else {

  } catch(laneErr){ console.error("Lane render error:", laneErr); }

  // 단일 이벤트 (기간 없는 이벤트) 카드 렌더링
  var singleEvents = dayEvents.filter(function(ev){

function computeEventLanes(){
  try {
  eventLanes = {};
  var year=view.year, month=view.month;
  var monthStart=fmt(year,month,1);
  var monthEnd=fmt(year,month,new Date(year,month+1,0).getDate());
  var RECUR=["브이팀회의","브이팀회의&지식DB","오픈한 북클럽"];
  var rangeEvs = events.filter(function(e){
    if(RECUR.indexOf(e.item)!==-1) return false;
    var de=getEventDateEnd(e);
    if(!de||de<=e.date) return false;
    return e.date<=monthEnd && de>=monthStart;
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  var laneOcc=[];
  rangeEvs.forEach(function(ev){
    var de=getEventDateEnd(ev);
    var lane=0;
    while(true){
      var occ=laneOcc[lane]||[];
      var conflict=occ.some(function(seg){ return ev.date<=seg.end && de>=seg.start; });
      if(!conflict) break;
      lane++;
    }
    eventLanes[ev.id]=lane;
    if(!laneOcc[lane]) laneOcc[lane]=[];
    laneOcc[lane].push({start:ev.date,end:de});
  });
  } catch(e){ console.error("computeEventLanes error:", e); eventLanes = {}; }
}

function render(){
  syncSelects();
  computeEventLanes();
  grid.style.display = "";
  grid.innerHTML = "";
  var firstDay = new Date(view.year, view.month, 1).getDay();
  var daysInMonth = new Date(view.year, view.month+1, 0).getDate();
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  var daysInPrevMonth = new Date(view.year, view.month, 0).getDate();
  for (var i=0; i<totalCells; i++){
    try {
      var dayNum = i - firstDay + 1;
      if (dayNum < 1){
        var prevDay = daysInPrevMonth + dayNum;
        var prevMonth = view.month - 1, prevYear = view.year;
        if(prevMonth < 0){ prevMonth = 11; prevYear--; }
        grid.appendChild(buildCell(fmt(prevYear, prevMonth, prevDay), prevDay, true));
      } else if (dayNum > daysInMonth){
        var nextDay = dayNum - daysInMonth;
        var nextMonth = view.month + 1, nextYear = view.year;
        if(nextMonth > 11){ nextMonth = 0; nextYear++; }
        grid.appendChild(buildCell(fmt(nextYear, nextMonth, nextDay), nextDay, true));
      } else {
        grid.appendChild(buildCell(fmt(view.year, view.month, dayNum), dayNum, false));
      }
    } catch(loopErr){
      console.error("render loop error at i="+i+":", loopErr);
      var emptyCell = document.createElement("div"); emptyCell.className = "cell";
      grid.appendChild(emptyCell);
    }
  }
}

var RECURRING_ITEM_NAMES = ["브이팀회의", "브이팀회의&지식DB", "오픈한 북클럽"];

function buildRecurringPayloads(startDate, endDate){
  var result = [];
  var cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  var limitMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  while (cursor <= limitMonth){
    var y=cursor.getFullYear(), m=cursor.getMonth();
    var dim=new Date(y,m+1,0).getDate();
    var thursdays=[], lastFriday=null;
    for (var dd=1;dd<=dim;dd++){
      var dt=new Date(y,m,dd); var dw=dt.getDay();
      if(dw===4) thursdays.push(dt);
      if(dw===5) lastFriday=dt;
    }
    thursdays.forEach(function(th,idx){
      if(th<startDate||th>endDate) return;
      var isLast=idx===thursdays.length-1;
      result.push({
        date:fmt(th.getFullYear(),th.getMonth(),th.getDate()),
        category:"team", stage:"", company:"",
        item:isLast?"브이팀회의&지식DB":"브이팀회의",
        imageUrl:"", variants:"", description:""
      });
    });
    if(lastFriday&&lastFriday>=startDate&&lastFriday<=endDate){
      result.push({
        date:fmt(lastFriday.getFullYear(),lastFriday.getMonth(),lastFriday.getDate()),
        category:"other", stage:"", company:"",
        item:"오픈한 북클럽", imageUrl:"", variants:"", description:""
      });
    }
    cursor.setMonth(cursor.getMonth()+1);
  }
  return result;
}

function autoFillRecurring(){
  // 현재 저장된 반복일정 중 가장 마지막 날짜 확인
  var recurringEvents = events.filter(function(e){
    return RECURRING_ITEM_NAMES.indexOf(e.item) !== -1;
  });
  var target = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  target.setFullYear(target.getFullYear() + 1); // 오늘 + 1년

  var maxDate = new Date(today); // 기본값: 오늘
  recurringEvents.forEach(function(e){
    var d = new Date(e.date + "T00:00:00");
    if(d > maxDate) maxDate = d;
  });

  // 마지막 날짜가 (오늘+350일) 이상이면 추가 불필요
  var threshold = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  threshold.setDate(threshold.getDate() + 350);
  if(maxDate >= threshold) return;

  // maxDate 다음날부터 target까지 생성
  var fillStart = new Date(maxDate);
  fillStart.setDate(fillStart.getDate() + 1);

  var toCreate = buildRecurringPayloads(fillStart, target);
  var existingKeys = {};
  events.forEach(function(e){ existingKeys[e.date+"|"+e.item]=true; });
  var filtered = toCreate.filter(function(p){ return !existingKeys[p.date+"|"+p.item]; });
  if(filtered.length === 0) return;

  // 백그라운드 순차 저장
  var i = 0;
  function next(){
    if(i >= filtered.length){ refreshAll(); return; }
    apiPost({action:"create", data:filtered[i]}).then(function(){ i++; next(); }).catch(function(){ i++; next(); });
  }
  next();
}

function refreshAll(){
  // 즉시 현재 뷰로 렌더 (빈 상태)
  renderCurrentView();
  renderMemberPanel();

  // 캐시 데이터 있으면 즉시 반영
  try {
    var cached = localStorage.getItem(EVENTS_CACHE_KEY);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < EVENTS_CACHE_TTL) {
        events = obj.data;
        renderCurrentView();
        if (selectedDate) renderPanelList(selectedDate);
        renderMemberPanel();
      }
    }
  } catch(e) {}

  // API 호출 후에도 현재 뷰 유지
  loadAllData(view.year, view.month).then(function(){
    renderCurrentView();
    if (selectedDate) renderPanelList(selectedDate);
    renderMemberPanel();
    autoFillRecurring();
  });
}

function loadEvents(){

      try { var c = localStorage.getItem(EVENTS_CACHE_KEY); if(c) events = JSON.parse(c).data||[]; } catch(e){}
      return;
    }
    events = data.events;
    try { localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: events })); } catch(e) {}
  }).catch(function(err){
    showToast("⚠️ 서버 연결 실패. 캐시 데이터를 사용합니다.");

  });
}

function loadHolidays(year){
  // 연도 단위 영구 캐시
  var hYearKey = "vlvd_holidays_year_" + year;
  try {
    var hc = localStorage.getItem(hYearKey);
    if (hc) {
      JSON.parse(hc).forEach(function(h){ holidays[h.date] = h.name; });
      return Promise.resolve(); // 캐시 히트 → 즉시 반환
    }
  } catch(e) {}
  // 캐시 미스 → 연도 전체 한 번에 로드
  return apiGet("holidays", { year: year, month: 0 }).then(function(data){
    var list = data.holidays || [];
    list.forEach(function(h){ holidays[h.date] = h.name; });
    try { localStorage.setItem(hYearKey, JSON.stringify(list)); } catch(e) {}
  }).catch(function(){});
}

function loadAllData(year, month){
  // events 캐시 우선 즉시 렌더
  try {
    var cached = localStorage.getItem(EVENTS_CACHE_KEY);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < EVENTS_CACHE_TTL) {
        events = obj.data;
        renderCurrentView();
      }
    }
  } catch(e) {}

  return Promise.all([loadEvents(), loadHolidays(year)]);
}

    var payload={
      id:isEdit?ev.id:undefined,
      date:startVal,
      category:cat,
      stage:finalStage,
      company:companyVal,
      item:fields.item?fields.item.value:"",

    if(isEdit){ localUpdateEvent(tempEv); } else { localAddEvent(tempEv); }
    renderCurrentView();
    renderPanelList(startVal);

      if(res.success===false){
        showToast("저장 실패: "+(res.error||"오류"));
        // 실패 시 롤백: 전체 재로드
        loadEvents().then(function(){ renderCurrentView(); renderPanelList(startVal); });
        return;
      }
      // 성공: 임시 ID → 실제 ID 교체
      if(!isEdit && res.id){
        for(var i=0;i<events.length;i++){
          if(String(events[i].id)===String(tempId)){ events[i].id=res.id; break; }
        }
        try{ localStorage.setItem(EVENTS_CACHE_KEY,JSON.stringify({ts:Date.now(),data:events})); }catch(e){}
      }
      showToast("저장되었습니다.");
    }).catch(function(){
      showToast("저장 오류. 새로고침 해주세요.");
      loadEvents().then(function(){ renderCurrentView(); renderPanelList(startVal); });
    });
  });

}

  loadAllData(view.year, view.month).then(function(){ renderCurrentView(); renderPanelList(dateStr); renderMemberPanel(); });
}
function fmtShort(dateStr){
  // "26.05.06" 형식
  if(!dateStr) return "";
  var p = dateStr.split("-");
  if(p.length < 3) return dateStr;
  return p[0].slice(2)+"."+p[1]+"."+p[2];
}
// 캘린더 표시 텍스트: 운영/상품 그룹은 "서브카테고리 - 제목", 나머지는 제목만
var PROD_CATS = ["production","shoot","prodetc"];
var OP_CATS   = ["team","other","opetc"];
// Optimistic 업데이트: 로컬 events 배열 즉시 수정
function localAddEvent(evObj){
  events.push(evObj);
  try { localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ts:Date.now(),data:events})); } catch(e){}
}
function localUpdateEvent(evObj){
  for(var i=0;i<events.length;i++){
    if(String(events[i].id)===String(evObj.id)){ events[i]=evObj; break; }
  }
  try { localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ts:Date.now(),data:events})); } catch(e){}
}
function localDeleteEvent(id){
  events = events.filter(function(e){ return String(e.id)!==String(id); });
  try { localStorage.setItem(EVENTS_CACHE_KEY, JSON.stringify({ts:Date.now(),data:events})); } catch(e){}
}
function getCalDisplayText(ev){
  var c = CATS[ev.category] || MEMBERS[ev.category] || CATS.other;
  var title = ev.item || "";
  if(ev.category === "leave"){
    var cld = parseLeaveDesc(ev.description);
    return (cld.type||"연차") + (title?" - "+title:"");
  }
  if(MEMBERS[ev.category]){
    return c.label + (title?" - "+title:"");
  }
  // 운영/상품 그룹: 서브카테고리명 - 제목
  if(PROD_CATS.indexOf(ev.category)!==-1 || OP_CATS.indexOf(ev.category)!==-1){
    return c.label + (title?" - "+title:"");
  }
  // 중요일정/커머스/컨텐츠: 제목만
  return title;
}
function getEventDateEnd(ev){
  if (ev.category === "production" || ev.category === "shoot") return "";
  var desc = String(ev.description || "");
  var sepIdx = desc.lastIndexOf("||");
  if (sepIdx === -1) return "";
  var after = desc.substring(sepIdx + 2);
  return /^\d{4}-\d{2}-\d{2}$/.test(after) ? after : "";
}
function getEventDesc(ev){
  var desc = String(ev.description || "");
  var sepIdx = desc.lastIndexOf("||");
  if (sepIdx === -1) return desc;
  var after = desc.substring(sepIdx + 2);
  if (/^\d{4}-\d{2}-\d{2}$/.test(after)) return desc.substring(0, sepIdx);
  return desc;
}
function calcRemainingVariants(variantStr){
  // 파샬 입고 후 잔여수량 계산: qty - cutQty
  var parsed = parseVariants(variantStr);
  return parsed.map(function(v){
    var qty = parseInt(v.qty) || 0;
    var cutQty = parseInt(v.cutQty) || 0;
    var remaining = qty - cutQty;
    return { type: v.type, color: v.color||"", parentColor: v.parentColor||"", size: v.size||"", qty: remaining > 0 ? String(remaining) : "0", cutQty: "" };
  }).filter(function(v){ return parseInt(v.qty) > 0; });
}
function parseVariants(str){
  if (!str) return [{type:"color",color:"",size:"",qty:"",cutQty:""}];
  return str.split(";").map(function(part){
    part=part.trim();
    if (part.indexOf("*")===0){ var bits=part.substring(1).split("/").map(function(s){return s.trim();}); return {type:"size",parentColor:bits[0]||"",size:bits[1]||"",qty:bits[2]||"",cutQty:bits[3]||""}; }
    var bits=part.split("/").map(function(s){return s.trim();}); return {type:"color",color:bits[0]||"",size:bits[1]||"",qty:bits[2]||"",cutQty:bits[3]||""};
  });
}
function stringifyVariants(arr){
  return arr.filter(function(v){return v.color||v.size||v.qty||v.cutQty;}).map(function(v){
    if (v.type==="size"){ return "*"+[v.parentColor||"",v.size,v.qty,v.cutQty||""].join("/"); }
    return [v.color,v.size,v.qty,v.cutQty||""].join("/");
  }).join("; ");
}
function findProductionInstructRecords(){
  return events.filter(function(e){ return e.category==="production"&&e.stage==="instruct"; }).slice().sort(function(a,b){ return a.date<b.date?1:-1; });
}
function setWeekdayRow(isGantt){
  var wr = document.getElementById("weekday-row");
  wr.innerHTML = "";
  if(isGantt){
    // 연도 네비게이션 버튼 (맨 앞에 삽입)
    var yearNav = document.createElement("div");
    yearNav.id = "gantt-year-nav";
    yearNav.style.cssText = "display:flex;align-items:center;gap:6px;grid-column:1/-1;justify-content:center;padding:4px 0;";
    var prevYearBtn = document.createElement("button");
    prevYearBtn.textContent = "◀";
    prevYearBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:14px;color:var(--color-text-secondary);padding:0 4px;line-height:1;";
    var yearLabel = document.createElement("span");
    yearLabel.id = "gantt-year-label";
    yearLabel.style.cssText = "font-size:20px;font-weight:700;color:var(--color-text);min-width:60px;text-align:center;";
    yearLabel.textContent = currentGanttYear + "년";
    var nextYearBtn = document.createElement("button");
    nextYearBtn.textContent = "▶";
    nextYearBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:14px;color:var(--color-text-secondary);padding:0 4px;line-height:1;";
    prevYearBtn.addEventListener("click", function(){
      currentGanttYear--;
      yearLabel.textContent = currentGanttYear + "년";
      renderGantt();
    });
    nextYearBtn.addEventListener("click", function(){
      currentGanttYear++;
      yearLabel.textContent = currentGanttYear + "년";
      renderGantt();
    });
    yearNav.appendChild(prevYearBtn);
    yearNav.appendChild(yearLabel);
    yearNav.appendChild(nextYearBtn);
    wr.style.gridTemplateColumns = "1fr";
    wr.appendChild(yearNav);
    return;
  } else {
    // 요일 복원
    ["일","월","화","수","목","금","토"].forEach(function(d, i){
      var el = document.createElement("div");
      el.textContent = d;
      if(i===0) el.className="sun";
      if(i===6) el.className="sat";
      wr.appendChild(el);
    });
    wr.style.gridTemplateColumns = "";
  }
}

document.getElementById("view-toggle-btn").addEventListener("click", function(){
  currentView = (currentView === "calendar") ? "gantt" : "calendar";
  var btn = document.getElementById("view-toggle-btn");
  if(currentView === "gantt"){
    btn.textContent = "캘린더뷰";
    btn.style.background = "var(--color-info)";
    btn.style.color = "#fff";
    btn.style.borderColor = "var(--color-info)";
    setWeekdayRow(true);
    renderGantt();
  } else {
    btn.textContent = "간트뷰";
    btn.style.background = "";
    btn.style.color = "var(--color-info)";
    btn.style.borderColor = "var(--color-info)";
    setWeekdayRow(false);
    render();
  }
});

function renderGantt(){
  syncSelects();
  grid.style.display = "block";
  grid.innerHTML = "";

  var YEAR = currentGanttYear || today.getFullYear();
  var yearStart = new Date(YEAR, 0, 1);
  var isLeap = (YEAR%4===0 && (YEAR%100!==0 || YEAR%400===0));
  var totalDays = isLeap ? 366 : 365;
  var COL_W = 28, LABEL_W = 190, ROW_H = 32, HEADER_H = 58;
  var todayStr = fmt(today.getFullYear(), today.getMonth(), today.getDate());
  var todayDayIdx = Math.round((today - yearStart) / 86400000);
  var RECUR = ["브이팀회의","브이팀회의&지식DB","오픈한 북클럽"];
  var MONTH_NAMES = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  function dayIdx(dateStr){
    return Math.round((new Date(dateStr+"T00:00:00") - yearStart) / 86400000);
  }

  // ── 외부 컨테이너 ──
  var outer = document.createElement("div");
  outer.style.cssText = "display:flex;width:100%;height:calc(100vh - 180px);overflow:hidden;";

  // ── 라벨 컬럼 (고정 좌측) ──
  var labelWrap = document.createElement("div");
  labelWrap.style.cssText = "width:"+LABEL_W+"px;flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--color-border);";
  var labelHead = document.createElement("div");
  labelHead.style.cssText = "height:"+HEADER_H+"px;flex-shrink:0;background:var(--color-bg);border-bottom:2px solid var(--color-border);display:flex;align-items:center;padding:0 12px;font-size:13px;font-weight:700;color:var(--color-text-secondary);";
  labelHead.textContent = "일정";
  var labelBody = document.createElement("div");
  labelBody.id = "g-label-body";
  labelBody.style.cssText = "overflow:hidden;flex:1;";
  labelWrap.appendChild(labelHead);
  labelWrap.appendChild(labelBody);

  // ── 타임라인 컬럼 (가로 스크롤) ──
  var tlWrap = document.createElement("div");
  tlWrap.id = "g-timeline";
  tlWrap.style.cssText = "flex:1;overflow:auto;";

  var tlInner = document.createElement("div");
  tlInner.style.cssText = "width:"+(totalDays*COL_W)+"px;";

  // 월 헤더
  var monthRow = document.createElement("div");
  monthRow.style.cssText = "display:flex;height:28px;background:var(--color-bg);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:10;";
  for(var m=0;m<12;m++){
    var dim = new Date(YEAR, m+1, 0).getDate();
    var mDiv = document.createElement("div");
    mDiv.style.cssText = "width:"+(dim*COL_W)+"px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border-right:2px solid var(--color-border);color:var(--color-text-secondary);";
    mDiv.textContent = MONTH_NAMES[m];
    monthRow.appendChild(mDiv);
  }
  tlInner.appendChild(monthRow);

  // 날짜 헤더
  var dayRow = document.createElement("div");
  dayRow.style.cssText = "display:flex;height:30px;background:var(--color-bg);border-bottom:2px solid var(--color-border);position:sticky;top:28px;z-index:10;";
  for(var di=0;di<totalDays;di++){
    var d = new Date(yearStart); d.setDate(d.getDate()+di);
    var dStr = fmt(d.getFullYear(),d.getMonth(),d.getDate());
    var dow = d.getDay();
    var dDiv = document.createElement("div");
    dDiv.style.cssText = "width:"+COL_W+"px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;border-right:1px solid var(--color-border);background:"+(dStr===todayStr?"#fff8e1":"");
    dDiv.style.color = dow===0?"var(--sun-color)":dow===6?"var(--sat-color)":"var(--color-text-secondary)";
    dDiv.textContent = d.getDate();
    dayRow.appendChild(dDiv);
  }
  tlInner.appendChild(dayRow);

  // 이벤트 바디
  var evBody = document.createElement("div");
  evBody.id = "g-ev-body";
  tlInner.appendChild(evBody);

  tlWrap.appendChild(tlInner);
  outer.appendChild(labelWrap);
  outer.appendChild(tlWrap);
  grid.appendChild(outer);

  // ── 보이는 달 계산 ──
  function getVisibleMonths(scrollLeft, viewWidth){
    var s = Math.max(0, Math.floor(scrollLeft / COL_W));
    var e = Math.min(totalDays-1, Math.ceil((scrollLeft+viewWidth) / COL_W));
    var vis = {};
    for(var i=s;i<=e;i++){
      var dd = new Date(yearStart); dd.setDate(dd.getDate()+i);
      vis[dd.getFullYear()*12+dd.getMonth()] = true;
    }
    return vis;
  }

  // ── 이벤트 행 빌드 ──
  function buildRows(visMonths){
    labelBody.innerHTML = "";
    evBody.innerHTML = "";
    var groupOrder = Object.keys(CATS).concat(Object.keys(MEMBERS));
    groupOrder.forEach(function(catKey){
      var ci = CATS[catKey]||MEMBERS[catKey]; if(!ci) return;
      var catEvs = events.filter(function(e){
        if(e.category!==catKey) return false;
        if(RECUR.indexOf(e.item)!==-1) return false;
        var es = e.date, ee = getEventDateEnd(e)||e.date;
        var sm = parseInt(es.substring(0,4))*12+parseInt(es.substring(5,7))-1;
        var em = parseInt(ee.substring(0,4))*12+parseInt(ee.substring(5,7))-1;
        for(var vm=sm;vm<=em;vm++){ if(visMonths[vm]) return true; }
        return false;
      });
      if(catEvs.length===0) return;

      // 섹션 헤더
      var sh = document.createElement("div");
      sh.style.cssText = "height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";
      sh.textContent = ci.label;
      labelBody.appendChild(sh);
      var sht = document.createElement("div");
      sht.style.cssText = "height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);position:relative;";
      // 오늘 선
      if(todayDayIdx>=0&&todayDayIdx<totalDays){
        var tl=document.createElement("div"); tl.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.15);";
        sht.appendChild(tl);
      }
      evBody.appendChild(sht);

      catEvs.forEach(function(ev){
        var es=ev.date, ee=getEventDateEnd(ev)||ev.date;
        var si=Math.max(0,dayIdx(es)), ei=Math.min(totalDays-1,dayIdx(ee));
        if(si>totalDays-1||ei<0) return;
        var txt = getCalDisplayText(ev)+"  "+fmtShort(es)+(ee!==es?"~"+fmtShort(ee):"");

        // 라벨 행
        var lr=document.createElement("div");
        lr.style.cssText="height:"+ROW_H+"px;display:flex;align-items:center;padding:0 10px;font-size:12px;border-bottom:1px solid var(--color-border);border-left:3px solid "+ci.color+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:var(--color-bg);";
        lr.textContent=getCalDisplayText(ev); lr.title=txt;
        lr.addEventListener("click",function(){ switchToCalendar(es); });
        labelBody.appendChild(lr);

        // 타임라인 행
        var tr=document.createElement("div");
        tr.style.cssText="height:"+ROW_H+"px;position:relative;border-bottom:1px solid var(--color-border);";
        if(todayDayIdx>=0&&todayDayIdx<totalDays){
          var tl2=document.createElement("div"); tl2.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.1);z-index:0;";
          tr.appendChild(tl2);
        }
        var bar=document.createElement("div");
        bar.style.cssText="position:absolute;left:"+(si*COL_W)+"px;width:"+((ei-si+1)*COL_W-4)+"px;top:5px;bottom:5px;background:"+ci.bg+";border-left:3px solid "+ci.color+";border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:500;color:"+ci.text+";white-space:nowrap;overflow:visible;cursor:pointer;z-index:1;";
        bar.textContent=txt;
        bar.addEventListener("click",function(){ switchToCalendar(es); });
        tr.appendChild(bar);
        evBody.appendChild(tr);
      });
    });
    // 라벨 바디 높이 동기화
    labelBody.style.height = evBody.offsetHeight+"px";
  }

  function switchToCalendar(dateStr){
    currentView="calendar";
    var btn=document.getElementById("view-toggle-btn");
    btn.textContent="간트뷰"; btn.style.background=""; btn.style.color="var(--color-info)"; btn.style.borderColor="var(--color-info)";
    setWeekdayRow(false);
    grid.style.display="";
    selectedDate=dateStr; render(); renderPanelList(dateStr);
  }

  // 초기 스크롤: 오늘 중심
  var initScroll = Math.max(0, todayDayIdx*COL_W - (tlWrap.offsetWidth||600)/2);
  tlWrap.scrollLeft = initScroll;
  var initVis = getVisibleMonths(initScroll, tlWrap.offsetWidth||800);
  buildRows(initVis);

  // 스크롤 이벤트: debounce
  var stimer=null;
  tlWrap.addEventListener("scroll", function(){
    // 세로 스크롤 동기화
    labelBody.scrollTop = tlWrap.scrollTop;
    // 가로 스크롤 → 보이는 달 업데이트 (debounce)
    if(stimer) clearTimeout(stimer);
    stimer = setTimeout(function(){
      var vis = getVisibleMonths(tlWrap.scrollLeft, tlWrap.offsetWidth);
      buildRows(vis);
      labelBody.scrollTop = tlWrap.scrollTop;
    }, 200);
  });
}

  showToast("데이터를 새로 불러오는 중...");
  refreshAll();
});

  localStorage.setItem(memoKey, this.value);
