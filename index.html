        else { selectedIds = selectedIds.filter(function(x){ return x !== idStr; }); }
      });
      row.appendChild(cb);
      var txt = document.createElement("div"); txt.style.fontSize = "14px";
      txt.textContent = fmtShort(ev.date) + " · " + (ev.item||"") + (ev.company ? " · "+ev.company : "");
      row.appendChild(txt);

  modal.appendChild(listWrap);

  var btnRow = document.createElement("div"); btnRow.className = "cost-modal-btnrow";

  doneBtn.addEventListener("click", function(){
    if(!prodLinks[item.id]) prodLinks[item.id] = { pattern:[], shoot:[], main:[] };

  });
  btnRow.appendChild(doneBtn);
  modal.appendChild(btnRow);

  modalRoot.appendChild(overlay);
}


function blankCostData(itemId, itemName, season){
  return {
    itemId: itemId,
    itemName: itemName,
    season: season || "",
    referenceUrl: "",
    multiplier1: "3.5", multiplier2: "4", multiplier3: "4.5", multiplier4: "5",
    sellingPrice: "",
    laborCost: "0",
    groups: [
      { title: "겉감", rows: [ blankCostRow() ] }
    ]
  };
}
function blankCostRow(){
  return { company:"", itemName:"", spec:"", unitPrice:"", negoPrice:"", actualQty:"" };
}

function calcRowYogu(row){
  var unit = parseFloat(row.negoPrice || row.unitPrice)||0;
  var actual = parseFloat(row.actualQty)||0;
  return unit * actual;
}
function calcGroupSubtotal(group){
  return group.rows.reduce(function(sum,r){ return sum + calcRowYogu(r); }, 0);
}
function calcCostTotals(costData){
  var rawMaterial, labor, supply, supplyVat, costPrice;
  if(costData.wansaip){
    // 완사입: VAT+ 금액을 직접 입력, 역산으로 원가 계산
    supplyVat = parseFloat(costData.wansaipVat)||0;
    supply = supplyVat / 1.1;
    rawMaterial = supply;
    labor = 0;
    costPrice = supply;
  } else {
    var rawMaterialTotal = costData.groups ? costData.groups.reduce(function(sum,g){ return sum + calcGroupSubtotal(g); }, 0) : 0;
    rawMaterial = rawMaterialTotal;
    labor = parseFloat(costData.laborCost)||0;
    supply = rawMaterial + labor;
    supplyVat = supply * 1.1;
    costPrice = supply;
  }
  var m1 = parseFloat(costData.multiplier1)||0;
  var m2 = parseFloat(costData.multiplier2)||0;
  var m3 = parseFloat(costData.multiplier3)||0;
  var m4 = parseFloat(costData.multiplier4)||0;
  var sp1 = costPrice*m1, sp2 = costPrice*m2, sp3 = costPrice*m3, sp4 = costPrice*m4;
  var sellingPrice = parseFloat(costData.sellingPrice)||0;
  var sellingMultiplier = costPrice>0 ? (sellingPrice/costPrice) : 0;
  return { rawMaterial:rawMaterial, labor:labor, supply:supply, supplyVat:supplyVat, costPrice:costPrice, sp1:sp1, sp2:sp2, sp3:sp3, sp4:sp4, sellingMultiplier:sellingMultiplier };
}

    } else {
      // 일반 모드: 원부자재/공임/원가공비/+VAT
      sumGrid.appendChild(sumCell("원부자재", totals.rawMaterial, false));
      sumGrid.appendChild(sumCell("공임", data.laborCost||0, true, function(v){ data.laborCost = v; }));
      sumGrid.appendChild(sumCell("원가공비", totals.supply, false));
      sumGrid.appendChild(sumCell("원가공비 +VAT", totals.supplyVat, false));
      modal.appendChild(sumGrid);
    }

    var mrow = document.createElement("div"); mrow.className = "cost-multiplier-row";
    var lab0 = document.createElement("div"); lab0.className="cmr-label"; lab0.textContent="배수"; mrow.appendChild(lab0);
    ["multiplier1","multiplier2","multiplier3","multiplier4"].forEach(function(k){
      var d = document.createElement("div");
      var inp = document.createElement("input"); inp.type="text"; inp.value = data[k];
      inp.addEventListener("input", function(){ data[k]=inp.value; });
      inp.addEventListener("blur", function(){ rebuild(); });
      d.appendChild(inp); mrow.appendChild(d);
    });
    var labSP = document.createElement("div"); labSP.className="cmr-label"; labSP.textContent="판매 금액"; mrow.appendChild(labSP);
    var spD = document.createElement("div");
    var spInp = document.createElement("input"); spInp.type="text"; spInp.value = data.sellingPrice||"";
    spInp.addEventListener("input", function(){ data.sellingPrice = spInp.value; });
    spInp.addEventListener("blur", function(){ rebuild(); });
    spD.appendChild(spInp); mrow.appendChild(spD);
    modal.appendChild(mrow);

    var prow = document.createElement("div"); prow.className = "cost-multiplier-row";
    var plab = document.createElement("div"); plab.className="cmr-label"; plab.textContent="판매가"; prow.appendChild(plab);
    [totals.sp1,totals.sp2,totals.sp3,totals.sp4].forEach(function(v){
      var d=document.createElement("div"); d.style.fontWeight="600"; d.textContent="₩"+Math.round(v).toLocaleString(); prow.appendChild(d);
    });
    var pdlab = document.createElement("div"); pdlab.className="cmr-label"; pdlab.textContent="판매 배수"; prow.appendChild(pdlab);
    var pdv = document.createElement("div"); pdv.style.fontWeight="600";
    pdv.textContent = totals.sellingMultiplier ? totals.sellingMultiplier.toFixed(2) : "#DIV/0!";
    prow.appendChild(pdv);
    modal.appendChild(prow);

    function rebuild(){ build(); }

    // 완사입 모드에서는 원자재 공정 섹션 숨김
    if(!data.wansaip){

    data.groups.forEach(function(group, gIdx){
      var gBlock = document.createElement("div"); gBlock.className = "cost-group-block";

      var titleRow = document.createElement("div"); titleRow.className = "cost-group-title-row";
      var titleInp = document.createElement("input"); titleInp.type="text"; titleInp.value = group.title;
      titleInp.addEventListener("input", function(){ group.title = titleInp.value; });
      titleRow.appendChild(titleInp);
      if(data.groups.length > 1){
        var delGBtn = document.createElement("button"); delGBtn.className="cost-group-del"; delGBtn.textContent="공정 삭제";
        delGBtn.addEventListener("click", function(){ data.groups.splice(gIdx,1); build(); });
        titleRow.appendChild(delGBtn);
      }
      gBlock.appendChild(titleRow);

      var table = document.createElement("table"); table.className = "cost-detail-table";
      var thead = document.createElement("thead"); var trh = document.createElement("tr");
      ["업체명","아이템명","규격","단가","네고단가","실요척","요척 단가",""].forEach(function(h){
        var th = document.createElement("th"); th.textContent = h; trh.appendChild(th);
      });
      thead.appendChild(trh); table.appendChild(thead);
      var tbody = document.createElement("tbody");

      group.rows.forEach(function(row, rIdx){
        var tr = document.createElement("tr");
        function inputCell(key, placeholder){
          var td = document.createElement("td");
          var inp = document.createElement("input"); inp.type="text"; inp.placeholder=placeholder||""; inp.value = row[key]||"";
          inp.addEventListener("input", function(){ row[key]=inp.value; });
          inp.addEventListener("blur", function(){ rebuild(); });
          td.appendChild(inp); return td;
        }
        tr.appendChild(inputCell("company"));
        tr.appendChild(inputCell("itemName"));
        tr.appendChild(inputCell("spec"));
        tr.appendChild(inputCell("unitPrice"));
        tr.appendChild(inputCell("negoPrice"));
        tr.appendChild(inputCell("actualQty"));
        var tdYogu = document.createElement("td"); tdYogu.className = "cdt-readonly";
        tdYogu.textContent = "₩" + Math.round(calcRowYogu(row)).toLocaleString();
        tr.appendChild(tdYogu);
        var tdDel = document.createElement("td");
        var rdBtn = document.createElement("button"); rdBtn.className = "prod-del-btn"; rdBtn.textContent="✕";
        rdBtn.style.fontSize="11px";
        rdBtn.addEventListener("click", function(){
          if(group.rows.length === 1) return;
          group.rows.splice(rIdx,1); build();
        });
        tdDel.appendChild(rdBtn); tr.appendChild(tdDel);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      gBlock.appendChild(table);

      var addRowBtn = document.createElement("button"); addRowBtn.className = "cost-add-row-btn"; addRowBtn.textContent = "+ 행 추가";
      addRowBtn.addEventListener("click", function(){ group.rows.push(blankCostRow()); build(); });
      gBlock.appendChild(addRowBtn);

      modal.appendChild(gBlock);
    });

    var addGroupBtn = document.createElement("button"); addGroupBtn.className = "cost-add-row-btn"; addGroupBtn.textContent = "+ 공정 추가 (예: 안감, 부자재 등)";
    addGroupBtn.style.width = "100%";
    addGroupBtn.addEventListener("click", function(){ data.groups.push({ title:"새 공정", rows:[blankCostRow()] }); build(); });
    modal.appendChild(addGroupBtn);
    } // end if(!data.wansaip)

    var btnRow = document.createElement("div"); btnRow.className = "cost-modal-btnrow";
    var cancelBtn = document.createElement("button"); cancelBtn.textContent = "취소";
    cancelBtn.addEventListener("click", function(){ modalRoot.innerHTML = ""; });
    btnRow.appendChild(cancelBtn);
    var doneBtn = document.createElement("button"); doneBtn.className = "primary"; doneBtn.textContent = "완료";
    doneBtn.addEventListener("click", function(){
      var finalTotals = calcCostTotals(data);
      data.finalUnitPrice = Math.round(finalTotals.costPrice);
      data.supplyVat = Math.round(finalTotals.supplyVat);
      data.rawMaterialTotal = finalTotals.rawMaterial;
      data.laborCost = data.laborCost || 0;
      data.supplyTotal = finalTotals.supply;
      data.sp1 = finalTotals.sp1; data.sp2 = finalTotals.sp2; data.sp3 = finalTotals.sp3; data.sp4 = finalTotals.sp4;
      data.sellingMultiplier = finalTotals.sellingMultiplier;
      costDataMap[item.id] = data;
      try { localStorage.setItem("vlvd_cost_cache", JSON.stringify(costDataMap)); } catch(e){}
      renderProductionTable();
      modalRoot.innerHTML = "";
      showToast("원가가 저장되었습니다.");
      apiPost({action:"saveCostData", data:data}).then(function(res){
        if(res && res.success===false) showToast("서버 저장 실패: "+(res.error||""));
      }).catch(function(){ showToast("서버 저장 실패 (로컬에는 저장됨)"); });
    });
    btnRow.appendChild(doneBtn);
    modal.appendChild(btnRow);
  }

  build();
  modalRoot.appendChild(overlay);
}

refreshAll();
renderMemberPanel();
Promise.all([loadProdItems(), loadEvents(), loadCostData()]).then(function(){
  deduplicateProdItems();
  autoSyncProdItemsFromCalendar();
  renderProductionTable();
});
loadProdLinks().then(function(){ renderProductionTable(); });
loadProdImages().then(function(){ renderProductionTable(); });
</script>
</body>
</html>
