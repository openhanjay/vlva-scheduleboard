<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VLVD 시즌 준비 운영 캘린더</title>
<style>
  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f4f6f9;
    --color-bg-tertiary: #eceff4;
    --color-border: #dce1ea;
    --color-text: #1a1a18;
    --color-text-secondary: #6b6a64;
    --color-text-tertiary: #9b9a93;
    --color-info: #0c447c;
    --color-info-bg: #e6f1fb;
    --color-today-bg: #eef1f6;
    --sat-color: #2f6fbf;
    --sun-color: #d14343;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--color-bg-secondary);
    color: var(--color-text);
    padding: 8px 16px;
    min-height: 100vh;
  }
  .app-tabs {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    margin-bottom: 14px;
    border-bottom: 2px solid var(--color-border);
    flex-wrap: wrap;
  }
  .app-tab-btn {
    border: none;
    background: transparent;
    padding: 10px 18px;
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-secondary);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    border-radius: 0;
    margin-bottom: -2px;
  }
  .app-tab-btn:hover { background: var(--color-bg-tertiary); }
  .app-tab-btn.active { color: var(--color-text); border-bottom-color: var(--color-text); }
  .app-page { display: none; }
  .app-page.active { display: block; }

  .layout {
    max-width: 100%;
    width: 100%;
    margin: 0;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .main-col { flex: 1; min-width: 0; }
  .side-col {
    width: 340px;
    flex-shrink: 0;
    position: sticky;
    top: 48px;
    margin-top: 4px;
  }
  .topbar {
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .topbar-title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .topbar-left h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
  .topbar-right-group { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .topbar-right { display: flex; gap: 8px; align-items: flex-end; }
  .topbar-bottom-row {
    display: flex; align-items: center; justify-content: flex-end;
    flex-wrap: wrap; gap: 12px;
  }
  button {
    font-family: inherit;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    border-radius: var(--radius-md);
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
    color: var(--color-text);
  }
  button:hover { background: var(--color-bg-tertiary); }
  button.primary { background: var(--color-text); color: #fff; border-color: var(--color-text); }
  button.primary:hover { opacity: 0.85; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-right: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text-secondary); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .calendar-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    background: var(--color-bg);
    border-bottom: 2px solid var(--color-border);
  }
  .weekday-row div { text-align: center; padding: 12px 0; font-size: 17px; font-weight: 700; color: var(--color-text-secondary); }
  .weekday-row div.sun { color: var(--sun-color); }
  .weekday-row div.sat { color: var(--sat-color); }
  .grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); }
  .cell {
    min-height: 150px;
    border-right: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
    padding: 10px;
    cursor: pointer;
    position: relative;
  }
  .cell.outside { background: var(--color-bg-secondary); cursor: default; }
  .cell.today { background: var(--color-bg); box-shadow: inset 0 0 0 2px #1a1a18; }
  .cell.selected { box-shadow: inset 0 0 0 2px #6ab04c; }
  .daynum { font-size: 17px; margin-bottom: 0; }
  .daynum.today { color: var(--color-text); font-weight: 600; }
  .daynum.sun { color: var(--sun-color); }
  .daynum.sat { color: var(--sat-color); }
  .holiday-name { font-size: 13px; color: var(--sun-color); margin-bottom:2px; }
  .event-card { border-radius: 5px; margin-bottom: 4px; padding: 4px 7px; cursor: pointer; display: flex; gap: 6px; align-items: flex-start; position: relative; overflow: visible; }
  .event-card img.thumb { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; flex-shrink: 0; margin-top: 1px; }
  .event-text { overflow: hidden; min-width: 0; flex: 1; }
  .event-line1 { font-size: 12px; font-weight: 700 !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-title { font-size: 12px; font-weight: 700 !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  .cell { position: relative; }

  .panel {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 18px;
    max-height: calc(100vh - 96px);
    overflow-y: auto;
  }
  .panel-empty { font-size: 15px; color: var(--color-text-tertiary); text-align: center; padding: 40px 10px; }
  .panel-date { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .panel-subtitle { font-size: 14px; color: var(--color-text-tertiary); margin-bottom: 14px; }
  .panel-add-btn { width: 100%; margin-bottom: 14px; }
  .panel-list-item {
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    padding: 8px 10px; margin-bottom: 8px; cursor: pointer;
  }
  .panel-list-item:hover { background: var(--color-bg-secondary); }
  .panel-list-item.active { border-color: var(--color-text); }
  .panel-list-cat { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .panel-list-main { font-size: 15px; }
  .panel-list-variant-wrap { margin-top: 6px; }
  .panel-variant-table { border-collapse: collapse; width: 100%; font-size: 13px; color: var(--color-text-secondary); }
  .panel-variant-table th { border: 1px solid var(--color-border); padding: 3px 6px; background: var(--color-bg-tertiary); color: var(--color-text-secondary); font-weight: 500; }
  .panel-variant-table td { border: 1px solid var(--color-border); padding: 3px 6px; text-align: center; background: var(--color-bg); }
  .panel-variant-table td.pvt-color { font-weight: 500; color: var(--color-text); background: var(--color-bg-secondary); }
  .panel-list-variant { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
  .panel-back-btn { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 12px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; border: none; background: none; padding: 0; }
  .panel-back-btn:hover { color: var(--color-text); background: none; }

  h2.panel-title { font-size: 18px; font-weight: 600; margin: 0 0 12px; }
  .cat-row { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: nowrap; overflow-x: auto; }
  .cat-btn { padding: 4px 7px; font-size: 13px; border-radius: var(--radius-md); border: 1px solid var(--color-border); background: var(--color-bg); cursor: pointer; white-space: nowrap; }
  .field-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field { margin-bottom: 10px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 7px 9px; border: 1px solid var(--color-border); border-radius: var(--radius-md);
    font-size: 15px; font-family: inherit; background: var(--color-bg); color: var(--color-text);
  }
  .variant-row { display: grid; grid-template-columns: 1fr 1fr 0.8fr 0.8fr 26px; gap: 5px; margin-bottom: 6px; align-items: center; }
  .variant-row input { padding: 6px 6px; font-size: 14px; min-width: 0; }
  .icon-btn { width: 26px; height: 26px; display:flex; align-items:center; justify-content:center; border:1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); cursor: pointer; flex-shrink: 0; padding: 0; }
  .icon-btn:disabled { opacity: 0.4; cursor: default; }
  .btn-row { display: flex; justify-content: space-between; margin-top: 16px; }
  .btn-row-right { display: flex; gap: 8px; }
  .danger { color: var(--sun-color); border-color: var(--sun-color); }
  .loading-text { font-size: 15px; color: var(--color-text-secondary); padding: 30px; text-align: center; }
  .spinner-inline { display:inline-block; width:12px; height:12px; border:2px solid var(--color-border); border-top-color: var(--color-text); border-radius:50%; animation: spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--color-text); color: #fff; padding: 10px 16px; border-radius: var(--radius-md); font-size: 15px; z-index: 100; }

  @media (max-width: 980px) {
    .layout { flex-direction: column; }
    .side-col { width: 100%; position: static; }
  }

  .gantt-wrap { overflow-x: auto; }
  .gantt-table { border-collapse: collapse; width: 100%; }
  .gantt-table th { background: var(--color-bg); border: 1px solid var(--color-border); padding: 6px 2px; font-size: 11px; font-weight: 700; text-align: center; color: var(--color-text-secondary); white-space: nowrap; min-width: 36px; }
  .gantt-table th.sun { color: var(--sun-color); }
  .gantt-table th.sat { color: var(--sat-color); }
  .gantt-table th.today-col { background: var(--color-bg-secondary); }
  .gantt-table th.label-head { min-width: 140px; text-align: left; padding-left: 10px; position: sticky; left: 0; z-index: 3; background: var(--color-bg); border-right: 2px solid var(--color-border); }
  .gantt-table td { border: 1px solid var(--color-border); padding: 0; height: 34px; position: relative; }
  .gantt-table td.label-cell { padding: 4px 10px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; min-width: 140px; background: var(--color-bg); position: sticky; left: 0; z-index: 1; border-right: 2px solid var(--color-border); }
  .gantt-table td.today-col { background: #f8f8f0; }
  .gantt-bar { position: absolute; top: 5px; bottom: 5px; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: 600; }
  .gantt-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; border-radius: 50%; cursor: pointer; }
  .gantt-section-row td { background: var(--color-bg-secondary) !important; font-size: 11px; font-weight: 700; color: var(--color-text-secondary); padding: 3px 10px; }

  /* ---- 생산관리 페이지 ---- */
  .prod-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
  .prod-toolbar h1 { font-size:26px; font-weight:700; margin:0; letter-spacing:-0.5px; }
  .prod-add-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .prod-add-row input[type=text] { padding:8px 10px; border:1px solid var(--color-border); border-radius:var(--radius-md); font-size:15px; font-family:inherit; background:var(--color-bg); color:var(--color-text); width:200px; }
  .prod-add-row select { padding:8px 10px; border:1px solid var(--color-border); border-radius:var(--radius-md); font-size:14px; font-family:inherit; background:var(--color-bg); color:var(--color-text); }
  .prod-table-wrap { background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-lg); overflow:hidden; }
  table.prod-table { width:100%; border-collapse:collapse; table-layout:fixed; }
  table.prod-table th { background:var(--color-bg-tertiary); border-bottom:1px solid var(--color-border); padding:10px 8px; font-size:13px; font-weight:700; color:var(--color-text-secondary); text-align:center; white-space:nowrap; overflow:hidden; }
  table.prod-table td { border-bottom:1px solid var(--color-border); padding:8px; font-size:14px; text-align:center; vertical-align:top; overflow:hidden; }
  table.prod-table th:nth-child(1) { width:12%; text-align:left; padding-left:14px; }  /* 아이템명 */
  table.prod-table th:nth-child(2) { width:13%; }   /* 메모 */
  table.prod-table th:nth-child(3) { width:7%; }   /* 이미지 */
  table.prod-table th:nth-child(4) { width:18%; }  /* 패턴 */
  table.prod-table th:nth-child(5) { width:18%; }  /* 샘플 */
  table.prod-table th:nth-child(6) { width:18%; }  /* 메인 */
  table.prod-table th:nth-child(7) { width:12%; }  /* 원가계산 */
  table.prod-table th:nth-child(8) { width:8%; }   /* 삭제 */
  .prod-memo-btn { font-size:18px; background:none; border:none; cursor:pointer; padding:4px; color:var(--color-text-tertiary); line-height:1; }
  .prod-memo-btn:hover { color:var(--color-text); background:none; }
  .prod-memo-btn.has-memo { color:#F4A836; }
  table.prod-table tr:last-child td { border-bottom:none; }
  table.prod-table tr:hover td { background: var(--color-bg-secondary); }
  .prod-item-name { text-align:left !important; font-weight:600; padding-left:14px !important; vertical-align:middle !important; }
  .prod-season-tag { display:inline-block; font-size:11px; padding:1px 7px; border-radius:10px; background:var(--color-bg-tertiary); color:var(--color-text-secondary); margin-left:6px; font-weight:500; }
  .prod-status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .prod-status-cell { font-size:13px; white-space:nowrap; padding:2px 0; }
  .prod-cost-btn { font-size:13px; padding:6px 10px; border-radius:var(--radius-md); border:1px solid var(--color-border); background:var(--color-bg); cursor:pointer; color:var(--color-text); white-space:nowrap; line-height:1.4; text-align:center; }
  .prod-cost-btn:hover { background: var(--color-bg-tertiary); }
  .prod-del-btn { font-size:12px; padding:4px 8px; border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-bg); color:var(--color-text-tertiary); cursor:pointer; }
  .prod-del-btn:hover { color: var(--sun-color); border-color: var(--sun-color); background: var(--color-bg); }
  .prod-empty-row td { text-align:center; color:var(--color-text-tertiary); font-size:14px; padding:40px 0; }
  .prod-link-add-btn { font-size:12px; width:22px; height:22px; line-height:1; padding:0; border:1px dashed var(--color-border); border-radius:50%; background:var(--color-bg); color:var(--color-text-tertiary); cursor:pointer; margin-top:2px; }
  .prod-link-add-btn:hover { background:var(--color-bg-tertiary); color:var(--color-text); }
  .prod-image-add-btn { font-size:11px; padding:14px 6px; border:1px dashed var(--color-border); border-radius:var(--radius-md); background:var(--color-bg); cursor:pointer; color:var(--color-text-tertiary); white-space:nowrap; }
  .prod-image-add-btn:hover { background:var(--color-bg-tertiary); color:var(--color-text); }

  /* ---- 원가계산 모달 ---- */
  .modal-overlay { position:fixed; inset:0; background:rgba(20,20,18,0.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .cost-modal { background:var(--color-bg); border-radius:var(--radius-lg); width:100%; max-width:880px; max-height:90vh; overflow-y:auto; padding:24px 26px; }
  .cost-modal h2 { margin:0 0 16px; font-size:20px; font-weight:700; }
  .cost-top-grid { display:grid; grid-template-columns: 1fr 1fr 1fr 1.4fr; gap:10px; margin-bottom:14px; }
  .cost-top-grid .ctg-block { border:1px solid var(--color-border); border-radius:var(--radius-md); overflow:hidden; }
  .cost-top-grid .ctg-label { background:var(--color-bg-tertiary); font-size:12px; font-weight:700; text-align:center; padding:6px 0; color:var(--color-text-secondary); }
  .cost-top-grid .ctg-value { padding:8px; }
  .cost-top-grid .ctg-value input, .cost-top-grid .ctg-value select { width:100%; border:none; text-align:center; font-size:14px; font-family:inherit; background:transparent; color:var(--color-text); }
  .cost-summary-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:0; border:1px solid var(--color-border); border-radius:var(--radius-md); overflow:hidden; margin-bottom:14px; }
  .cost-summary-cell { border-right:1px solid var(--color-border); }
  .cost-summary-cell:last-child { border-right:none; }
  .cost-summary-cell .label-row { display:grid; grid-template-columns: 1fr; background:var(--color-bg-tertiary); }
  .cost-summary-cell .label-row > div { font-size:11px; font-weight:700; text-align:center; padding:5px 0; color:var(--color-text-secondary); }
  .cost-summary-cell .value-row { display:grid; grid-template-columns: 1fr; }
  .cost-summary-cell .value-row > div { font-size:14px; font-weight:600; text-align:center; padding:8px 0; }
  .cost-multiplier-row { display:grid; grid-template-columns: 50px repeat(4,1fr) 90px 1fr; gap:0; border:1px solid var(--color-border); border-radius:var(--radius-md); overflow:hidden; margin-bottom:14px; }
  .cost-multiplier-row > div { border-right:1px solid var(--color-border); padding:6px; text-align:center; font-size:13px; }
  .cost-multiplier-row > div:last-child { border-right:none; }
  .cost-multiplier-row .cmr-label { background:var(--color-bg-tertiary); font-weight:700; font-size:11px; }
  .cost-multiplier-row input { width:100%; border:1px solid var(--color-border); border-radius:4px; text-align:center; font-size:13px; padding:4px; font-family:inherit; }
  .cost-section-title { font-size:13px; font-weight:700; color:var(--color-text-secondary); margin:16px 0 8px; }
  table.cost-detail-table { width:100%; border-collapse:collapse; margin-bottom:10px; }
  table.cost-detail-table th { background:var(--color-bg-tertiary); border:1px solid var(--color-border); font-size:12px; font-weight:700; color:var(--color-text-secondary); padding:6px 4px; }
  table.cost-detail-table td { border:1px solid var(--color-border); padding:3px; text-align:center; }
  table.cost-detail-table td input { width:100%; border:none; text-align:center; font-size:13px; padding:5px 3px; font-family:inherit; background:transparent; color:var(--color-text); }
  table.cost-detail-table td.cdt-readonly { background:var(--color-bg-secondary); color:var(--color-text-secondary); font-size:13px; }
  .cost-add-row-btn { font-size:13px; padding:5px 10px; border:1px dashed var(--color-border); border-radius:var(--radius-md); background:var(--color-bg); cursor:pointer; color:var(--color-text-secondary); margin-bottom:4px; }
  .cost-add-row-btn:hover { background:var(--color-bg-tertiary); }
  .cost-group-block { border:1px solid var(--color-border); border-radius:var(--radius-md); padding:10px; margin-bottom:12px; position:relative; }
  .cost-group-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .cost-group-title-row input { font-size:14px; font-weight:700; border:none; background:transparent; color:var(--color-text); padding:2px; width:140px; }
  .cost-group-del { font-size:12px; color:var(--color-text-tertiary); border:none; background:none; cursor:pointer; padding:2px 6px; }
  .cost-group-del:hover { color:var(--sun-color); }
  .cost-modal-btnrow { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
</style>
</head>
<body>

<div class="app-tabs">
  <button class="app-tab-btn active" data-page="calendar-page">운영 캘린더</button>
  <button class="app-tab-btn" data-page="production-page">생산 관리</button>
</div>

<div class="app-page active" id="calendar-page">
<div class="layout">
  <div class="main-col">
    <div class="topbar">
      <div class="topbar-title-row">
        <div class="topbar-left">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h1 style="margin:0;display:flex;align-items:center;gap:4px;font-size:28px;font-weight:700;letter-spacing:-0.5px;white-space:nowrap;">
              <select id="year-select" style="font-family:inherit;font-size:28px;font-weight:700;letter-spacing:-0.5px;border:none;background:transparent;cursor:pointer;color:var(--color-text);padding:0 2px;appearance:auto;"></select>
              <select id="month-select" style="font-family:inherit;font-size:28px;font-weight:700;letter-spacing:-0.5px;border:none;background:transparent;cursor:pointer;color:var(--color-text);padding:0 2px;appearance:auto;"></select>
            </h1>
            <input id="month-memo" type="text" placeholder="이달의 프로모션 / 이벤트 메모..."
              style="font-family:inherit;font-size:20px;font-weight:700;color:var(--color-text);border:none;border-bottom:1.5px solid var(--color-border);background:transparent;padding:4px 2px;width:300px;outline:none;"
              onfocus="this.style.borderBottomColor='var(--color-text)'"
              onblur="this.style.borderBottomColor='var(--color-border)'" />
          </div>
        </div>
        <div class="topbar-right">
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#39FF14;"></span>중요일정</div>

function buildCell(dateStr, dayLabel, isOutside){
  var cell = document.createElement("div");
  cell.className = "cell";
  if (isOutside){
    cell.className += " outside";
    cell.style.opacity = "0.45";
    var outsideNum = document.createElement("div");
    outsideNum.textContent = dayLabel;
    outsideNum.style.cssText = "font-size:15px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:400;";
    cell.appendChild(outsideNum);
    if (dateStr) {
      var outsideDow = new Date(dateStr+"T00:00:00").getDay();
      var outsideEvents = events.filter(function(e){
        var de = getEventDateEnd(e);
        if(de && de > e.date){
          if(outsideDow===0||outsideDow===6) return false;
          return dateStr >= e.date && dateStr <= de;
        }
        return e.date === dateStr;
      });
      outsideEvents.forEach(function(ev){
        if(["브이팀회의","브이팀회의&지식DB","오픈한 북클럽"].indexOf(ev.item)!==-1) return;
        var c = CATS[ev.category]||MEMBERS[ev.category]||CATS.other;
        var oc = document.createElement("div");
        oc.style.cssText = "font-size:12px;padding:2px 6px;border-radius:4px;background:"+c.bg+";color:"+c.text+";margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;";
        oc.textContent = getCalDisplayText(ev);
        cell.appendChild(oc);
      });
    }
    return cell;
  }
  try {
  var isToday = dateStr === fmt(today.getFullYear(), today.getMonth(), today.getDate());
  var d = new Date(dateStr + "T00:00:00");
  var dow = d.getDay();
  var isHoliday = !!holidays[dateStr];
  if (isToday) cell.className += " today";
  if (selectedDate === dateStr) cell.className += " selected";
  var headerRow = document.createElement("div");
  headerRow.style.cssText = "display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px;";
  var num = document.createElement("div");
  num.textContent = dayLabel;
  num.className = "daynum" + (isToday ? " today" : (dow===0 || isHoliday ? " sun" : (dow===6 ? " sat" : "")));
  num.style.marginBottom = "0";
  headerRow.appendChild(num);
  if (isHoliday){
    var hname = document.createElement("span"); hname.className = "holiday-name"; hname.style.margin="0"; hname.textContent = holidays[dateStr];
    headerRow.appendChild(hname);
  }
  cell.appendChild(headerRow);
  var cellDow = new Date(dateStr + "T00:00:00").getDay();
  var dayEvents = events.filter(function(e){
    var dateEnd = getEventDateEnd(e);
    if (dateEnd && dateEnd > e.date){
      if (cellDow === 0 || cellDow === 6) return false;
      return dateStr >= e.date && dateStr <= dateEnd;
    }
    return e.date === dateStr;
  });
  var RECURRING_ITEMS = ["브이팀회의", "브이팀회의&지식DB", "오픈한 북클럽"];
  var BAR_H = 20;

  try {
  var cellDate = new Date(dateStr+"T00:00:00");
  var wDow = cellDate.getDay();
  var wStart = new Date(cellDate); wStart.setDate(cellDate.getDate()-wDow);
  var wEnd   = new Date(cellDate); wEnd.setDate(cellDate.getDate()+(6-wDow));
  var wStartStr = fmt(wStart.getFullYear(), wStart.getMonth(), wStart.getDate());
  var wEndStr   = fmt(wEnd.getFullYear(),   wEnd.getMonth(),   wEnd.getDate());

  var weekRangeEvs = events.filter(function(e){
    if(RECURRING_ITEMS.indexOf(e.item)!==-1) return false;
    var de=getEventDateEnd(e);
    if(!de||de<=e.date) return false;
    return e.date<=wEndStr && de>=wStartStr && eventLanes[e.id]!==undefined;
  });

  var maxLane = -1;
  weekRangeEvs.forEach(function(e){ if(eventLanes[e.id]>maxLane) maxLane=eventLanes[e.id]; });

  for(var lane=0; lane<=maxLane; lane++){
    var activeEv=null;
    for(var ri=0;ri<weekRangeEvs.length;ri++){
      var re=weekRangeEvs[ri];
      var de=getEventDateEnd(re);
      if(eventLanes[re.id]===lane && re.date<=dateStr && de>=dateStr){ activeEv=re; break; }
    }
    if(activeEv && wDow!==0 && wDow!==6){
      var c=CATS[activeEv.category]||MEMBERS[activeEv.category]||CATS.other;
      var de=getEventDateEnd(activeEv);
      var evWStart = activeEv.date>wStartStr ? activeEv.date : wStartStr;
      var evWEnd   = de<wEndStr ? de : wEndStr;
      var isLast   = dateStr===evWEnd;
      var prevDate = new Date(cellDate); prevDate.setDate(cellDate.getDate()-1);
      var prevDow  = prevDate.getDay();
      var isFirst  = dateStr===activeEv.date || prevDow===0 || prevDow===6 || activeEv.date===dateStr;
      var PAD=10;
      var leftOff  = isFirst?"0px":"-"+PAD+"px";
      var barW     = "calc(100% + "+(isFirst?0:PAD)+"px + "+(isLast?0:PAD)+"px)";
      var brTL=isFirst?"4px":"0", brBL=isFirst?"4px":"0";
      var brTR=isLast?"4px":"0",  brBR=isLast?"4px":"0";
      var bar=document.createElement("div");
      var barOverflow=(isFirst&&!isLast)?"visible":"hidden";
    bar.style.cssText="position:relative;left:"+leftOff+";width:"+barW+";height:"+BAR_H+"px;background:"+c.bg+";border-radius:"+brTL+" "+brTR+" "+brBR+" "+brBL+";margin-bottom:3px;overflow:"+barOverflow+";cursor:pointer;display:flex;align-items:center;padding:0 6px;"+(isFirst?"border-left:2px solid "+c.color+";":"")+"flex-shrink:0;box-sizing:border-box;";
      var sp = null;
      var fullSpTxt = getCalDisplayText(activeEv) + "  " + fmtShort(activeEv.date) + "~" + fmtShort(getEventDateEnd(activeEv)||activeEv.date);
      if(isFirst){
        sp = document.createElement("span");
        sp.style.cssText="font-size:12px;font-weight:700;color:"+c.text+";white-space:nowrap;overflow:visible;pointer-events:none;position:relative;z-index:3;";
        sp.textContent = fullSpTxt;
        bar.appendChild(sp);
      }
      (function(ev,ds){
      bar.addEventListener("click",function(e){ e.stopPropagation(); selectedDate=ds; render(); renderPanelList(ds); });
    })(activeEv,dateStr);
      cell.appendChild(bar);
    } else {
      var hasBarHere = false;
      for(var si2=0; si2<laneEvents.length; si2++){
        var le2=laneEvents[si2];
        if(le2.lane===lane){
          var le2s=le2.ev.date;
          var le2e=getEventDateEnd(le2.ev)||le2s;
          if(dateStr>=le2s && dateStr<=le2e){ hasBarHere=true; break; }
        }
      }
      if(hasBarHere){
        var spacer=document.createElement("div");
        spacer.style.cssText="height:"+BAR_H+"px;margin-bottom:3px;flex-shrink:0;";
        cell.appendChild(spacer);
      }
    }
  }

  } catch(laneErr){ console.error("Lane render error:", laneErr); }

  var singleEvents = dayEvents.filter(function(ev){
    var de=getEventDateEnd(ev);
    return !de||de<=ev.date;
  });
  function hasExpected(ev){
    if(ev.stage !== "instruct") return false;
    return events.some(function(e){
      return (e.stage==="expected"||e.stage==="expected_p") &&
             e.category === ev.category &&
             (e.item||"").trim().toLowerCase() === (ev.item||"").trim().toLowerCase() &&
             e.date >= ev.date;
    });
  }
  function stageOrder(ev){
    var s = ev.stage||"";
    if(s==="completed"||s==="completed_p") return 4;
    if(s==="expected"||s==="expected_p") return 3;
    if(s==="instruct") return hasExpected(ev) ? 1 : 0;
    return 2;
  }
  singleEvents = singleEvents.slice().sort(function(a,b){ return stageOrder(a)-stageOrder(b); });
  singleEvents.forEach(function(ev){
    var c=CATS[ev.category]||MEMBERS[ev.category]||CATS.other;
    if(RECURRING_ITEMS.indexOf(ev.item)!==-1){
      var tag=document.createElement("span");
      tag.textContent=ev.item;
      tag.style.cssText="font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;background:"+c.bg+";color:"+c.text+";white-space:nowrap;cursor:pointer;flex-shrink:0;";
      tag.addEventListener("click",function(e){ e.stopPropagation(); selectedDate=dateStr; render(); renderPanelList(dateStr); });
      headerRow.appendChild(tag);
      return;
    }
    var card=document.createElement("div"); card.className="event-card"; card.style.background=c.bg;
    if(ev.category==="production"||ev.category==="shoot"||ev.category==="pattern"){
      var textCol=document.createElement("div"); textCol.className="event-text";

      var ev_s2=getItemSeason(ev); var ev_s2pfx=ev_s2?"["+ev_s2+"] ":"";
      var rawOrder = parseProdOrder(ev.description||"");
      var displayOrder = rawOrder ? (/^\d+$/.test(rawOrder) ? rawOrder+"차" : rawOrder) : "";

      // 1줄: 차수 + 카테고리명 + 단계
      var catName = ev.category==="production" ? "메인" : ev.category==="shoot" ? "샘플" : "패턴";
      var stagePart = stageLabel(ev.stage, ev.category);
      if(ev.stage==="instruct") stagePart = "";
      var line1txt = (displayOrder ? displayOrder+" " : "") + catName + (stagePart ? " "+stagePart : "");

      var line1=document.createElement("div"); line1.className="event-line1"; line1.style.color=c.text;
      line1.textContent = line1txt;

      // 2줄: 상품명 · 업체명
      var line2=document.createElement("div");
      line2.style.cssText="font-size:11px;font-weight:700;color:"+c.text+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0.85;margin-top:1px;";
      line2.textContent = ev_s2pfx+(ev.item||"")+" · "+(ev.company||"");

      card.title = line1txt + " · " + ev_s2pfx+(ev.item||"")+" · "+(ev.company||"");
      textCol.appendChild(line1);
      textCol.appendChild(line2);
      card.appendChild(textCol);
    } else {
      var txt=document.createElement("div"); txt.className="event-title";

      txt.style.fontWeight = "700";

    }

    cell.appendChild(card);
  });

  cell.addEventListener("click", function(){ selectedDate = dateStr; render(); renderPanelList(dateStr); });
  } catch(cellErr){
    console.error("buildCell error on " + dateStr + ":", cellErr);
    cell.addEventListener("click", function(){ selectedDate = dateStr; render(); renderPanelList(dateStr); });
  }
  return cell;
}
function computeEventLanes(){
  try {
  eventLanes = {};
  var year=view.year, month=view.month;
  var monthStart=fmt(year,month,1);
  var monthEnd=fmt(year,month,new Date(year,month+1,0).getDate());
  var RECUR=["브이팀회의","브이팀회의&지식DB","오픈한 북클럽"];
  var rangeEvs = events.filter(function(e){
    if(RECUR.indexOf(e.item)!==-1) return false;
    var de=getEventDateEnd(e);
    if(!de||de<=e.date) return false;
    return e.date<=monthEnd && de>=monthStart;
  }).sort(function(a,b){ return a.date<b.date?-1:1; });
  var laneOcc=[];
  rangeEvs.forEach(function(ev){
    var de=getEventDateEnd(ev);
    var lane=0;
    while(true){
      var occ=laneOcc[lane]||[];
      var conflict=occ.some(function(seg){ return ev.date<=seg.end && de>=seg.start; });
      if(!conflict) break;
      lane++;
    }
    eventLanes[ev.id]=lane;
    if(!laneOcc[lane]) laneOcc[lane]=[];
    laneOcc[lane].push({start:ev.date,end:de});
  });
  } catch(e){ console.error("computeEventLanes error:", e); eventLanes = {}; }
}

function render(){
  syncSelects();
  computeEventLanes();
  grid.style.display = "";
  grid.innerHTML = "";
  var firstDay = new Date(view.year, view.month, 1).getDay();
  var daysInMonth = new Date(view.year, view.month+1, 0).getDate();
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  var daysInPrevMonth = new Date(view.year, view.month, 0).getDate();
  for (var i=0; i<totalCells; i++){
    try {
      var dayNum = i - firstDay + 1;
      if (dayNum < 1){
        var prevDay = daysInPrevMonth + dayNum;
        var prevMonth = view.month - 1, prevYear = view.year;
        if(prevMonth < 0){ prevMonth = 11; prevYear--; }
        grid.appendChild(buildCell(fmt(prevYear, prevMonth, prevDay), prevDay, true));
      } else if (dayNum > daysInMonth){
        var nextDay = dayNum - daysInMonth;
        var nextMonth = view.month + 1, nextYear = view.year;
        if(nextMonth > 11){ nextMonth = 0; nextYear++; }
        grid.appendChild(buildCell(fmt(nextYear, nextMonth, nextDay), nextDay, true));
      } else {
        grid.appendChild(buildCell(fmt(view.year, view.month, dayNum), dayNum, false));
      }
    } catch(loopErr){
      console.error("render loop error at i="+i+":", loopErr);
      var emptyCell = document.createElement("div"); emptyCell.className = "cell";
      grid.appendChild(emptyCell);
    }
  }

var RECURRING_ITEM_NAMES = ["브이팀회의", "브이팀회의&지식DB", "오픈한 북클럽"];

function buildRecurringPayloads(startDate, endDate){
  var result = [];
  var cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  var limitMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  while (cursor <= limitMonth){
    var y=cursor.getFullYear(), m=cursor.getMonth();
    var dim=new Date(y,m+1,0).getDate();
    var thursdays=[], lastFriday=null;
    for (var dd=1;dd<=dim;dd++){
      var dt=new Date(y,m,dd); var dw=dt.getDay();
      if(dw===4) thursdays.push(dt);
      if(dw===5) lastFriday=dt;
    }
    thursdays.forEach(function(th,idx){
      if(th<startDate||th>endDate) return;
      var isLast=idx===thursdays.length-1;
      result.push({
        date:fmt(th.getFullYear(),th.getMonth(),th.getDate()),
        category:"team", stage:"", company:"",
        item:isLast?"브이팀회의&지식DB":"브이팀회의",
        imageUrl:"", variants:"", description:""
      });
    });
    if(lastFriday&&lastFriday>=startDate&&lastFriday<=endDate){
      result.push({
        date:fmt(lastFriday.getFullYear(),lastFriday.getMonth(),lastFriday.getDate()),
        category:"other", stage:"", company:"",
        item:"오픈한 북클럽", imageUrl:"", variants:"", description:""
      });
    }
    cursor.setMonth(cursor.getMonth()+1);
  }
  return result;
}

function autoFillRecurring(){
  var recurringEvents = events.filter(function(e){
    return RECURRING_ITEM_NAMES.indexOf(e.item) !== -1;
  });
  var target = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  target.setFullYear(target.getFullYear() + 1);

  var maxDate = new Date(today);
  recurringEvents.forEach(function(e){
    var d = new Date(e.date + "T00:00:00");
    if(d > maxDate) maxDate = d;
  });

  var threshold = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  threshold.setDate(threshold.getDate() + 350);
  if(maxDate >= threshold) return;

  var fillStart = new Date(maxDate);
  fillStart.setDate(fillStart.getDate() + 1);

  var toCreate = buildRecurringPayloads(fillStart, target);
  var existingKeys = {};
  events.forEach(function(e){ existingKeys[e.date+"|"+e.item]=true; });
  var filtered = toCreate.filter(function(p){ return !existingKeys[p.date+"|"+p.item]; });
  if(filtered.length === 0) return;

  var i = 0;
  function next(){
    if(i >= filtered.length){ refreshAll(); return; }
    apiPost({action:"create", data:filtered[i]}).then(function(){ i++; next(); }).catch(function(){ i++; next(); });
  }
  next();
}

function loadHolidays(year){
  var hYearKey = "vlvd_holidays_year_" + year;
  try {
    var hc = localStorage.getItem(hYearKey);
    if (hc) {
      JSON.parse(hc).forEach(function(h){ holidays[h.date] = h.name; });
      return Promise.resolve();
    }
  } catch(e) {}
  return apiGet("holidays", { year: year, month: 0 }).then(function(data){
    var list = data.holidays || [];
    list.forEach(function(h){ holidays[h.date] = h.name; });
    try { localStorage.setItem(hYearKey, JSON.stringify(list)); } catch(e) {}
  }).catch(function(){});
}

function loadAllData(year, month){
  try {
    var cached = localStorage.getItem(EVENTS_CACHE_KEY);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < EVENTS_CACHE_TTL) {
        events = obj.data;
        renderCurrentView();
      }
    }
  } catch(e) {}

  return Promise.all([loadEvents(), loadHolidays(year)]);
}

function parseSeasonFromDesc(desc){
  var m = String(desc||"").match(/^\[([0-9]{2}(?:SS|FW))\]/);
  return m ? m[1] : "";
}
function parseProdOrder(desc){
  // production/shoot/pattern desc 형식: "26SS" 또는 "26SS|차수:1차"
  var m = String(desc||"").match(/\|\ucc28\uc218:([^|]*)/);
  return m ? m[1] : "";
}
function buildProdDesc(season, order){
  var base = season || "";
  if(order) base += "|차수:" + order;
  return base;
}
function parseProdSeason(desc){
  // production/shoot/pattern desc에서 시즌만 추출 (|차수: 앞부분)
  var base = String(desc||"").split("|차수:")[0];
  return /^[0-9]{2}(SS|FW)$/.test(base) ? base : "";
}
function stripSeasonFromDesc(desc){
  return String(desc||"").replace(/^\[[0-9]{2}(?:SS|FW)\]/, "");
}
function getItemSeason(ev){
  if(!ev || (ev.category!=="production" && ev.category!=="shoot" && ev.category!=="pattern")) return "";
  if(ev.description && /^[0-9]{2}(SS|FW)($|\|)/.test(String(ev.description))) return String(ev.description).split("|")[0];
  for(var i=0;i<events.length;i++){
    var e=events[i];
    if(e.category===ev.category && e.stage==="instruct" &&
       (e.company||"")===(ev.company||"") && (e.item||"").trim().toLowerCase()===(ev.item||"").trim().toLowerCase() &&
       e.description && /^[0-9]{2}(SS|FW)($|\|)/.test(String(e.description))){
      return String(e.description).split("|")[0];
    }
  }
  return "";
}
function getCalDisplayText(ev){
  var c = CATS[ev.category] || MEMBERS[ev.category] || CATS.other;
  var title = ev.item || "";
  if(ev.category === "leave"){
    var cld = parseLeaveDesc(ev.description);
    return (cld.type||"연차") + (title?" - "+title:"");
  }
  if(MEMBERS[ev.category]){
    var ms = parseSeasonFromDesc(ev.description);
    var msmid = ms?" ["+ms+"]":"";
    return c.label+msmid+(title?"·"+title:"");
  }
  if(PROD_CATS.indexOf(ev.category)!==-1 || OP_CATS.indexOf(ev.category)!==-1){
    var s2 = parseSeasonFromDesc(ev.description);
    var smid = s2?" ["+s2+"]":"";
    if(ev.category==="opetc"||ev.category==="prodetc") return (s2?"["+s2+"]·":"")+title;
    return c.label+smid+(title?"·"+title:"");
  }
  var s = parseSeasonFromDesc(ev.description);
  return (s?"["+s+"]·":"")+title;
}
function getEventDateEnd(ev){
  if (ev.category === "production" || ev.category === "shoot" || ev.category === "pattern") return "";
  var desc = stripSeasonFromDesc(ev.description);
  var sepIdx = desc.lastIndexOf("||");
  if (sepIdx === -1) return "";
  var after = desc.substring(sepIdx + 2);
  return /^\d{4}-\d{2}-\d{2}$/.test(after) ? after : "";
}
function getEventDesc(ev){
  var desc = stripSeasonFromDesc(ev.description);
  var sepIdx = desc.lastIndexOf("||");
  if (sepIdx === -1) return desc;
  var after = desc.substring(sepIdx + 2);
  if (/^\d{4}-\d{2}-\d{2}$/.test(after)) return desc.substring(0, sepIdx);
  return desc;
}
function calcRemainingVariants(variantStr){
  var parsed = parseVariants(variantStr);
  return parsed.map(function(v){
    var qty = parseInt(v.qty) || 0;
    var cutQty = parseInt(v.cutQty) || 0;
    var remaining = qty - cutQty;
    return { type: v.type, color: v.color||"", parentColor: v.parentColor||"", size: v.size||"", qty: remaining > 0 ? String(remaining) : "0", cutQty: "" };
  }).filter(function(v){ return parseInt(v.qty) > 0; });
}
function parseVariants(str){
  if (!str) return [{type:"color",color:"",size:"",qty:"",cutQty:""}];
  return str.split(";").map(function(part){
    part=part.trim();
    if (part.indexOf("*")===0){ var bits=part.substring(1).split("/").map(function(s){return s.trim();}); return {type:"size",parentColor:bits[0]||"",size:bits[1]||"",qty:bits[2]||"",cutQty:bits[3]||""}; }
    var bits=part.split("/").map(function(s){return s.trim();}); return {type:"color",color:bits[0]||"",size:bits[1]||"",qty:bits[2]||"",cutQty:bits[3]||""};
  });
}
function stringifyVariants(arr){
  return arr.filter(function(v){return v.color||v.size||v.qty||v.cutQty;}).map(function(v){
    if (v.type==="size"){ return "*"+[v.parentColor||"",v.size,v.qty,v.cutQty||""].join("/"); }
    return [v.color,v.size,v.qty,v.cutQty||""].join("/");
  }).join("; ");
}

  var RECUR = ["브이팀회의","브이팀회의&지식DB","오픈한 북클럽"];
  var MONTH_NAMES = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

    return Math.round((new Date(dateStr+"T00:00:00") - yearStart) / 86400000);
  }

  var outer = document.createElement("div");
  outer.style.cssText = "display:flex;width:100%;height:calc(100vh - 180px);overflow:hidden;";

  var labelWrap = document.createElement("div");
  labelWrap.style.cssText = "width:"+LABEL_W+"px;flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--color-border);";
  var labelHead = document.createElement("div");
  labelHead.style.cssText = "height:"+HEADER_H+"px;flex-shrink:0;background:var(--color-bg);border-bottom:2px solid var(--color-border);display:flex;align-items:center;padding:0 12px;font-size:13px;font-weight:700;color:var(--color-text-secondary);";
  labelHead.textContent = "일정";
  var labelBody = document.createElement("div");
  labelBody.id = "g-label-body";
  labelBody.style.cssText = "overflow:hidden;flex:1;";
  labelWrap.appendChild(labelHead);
  labelWrap.appendChild(labelBody);

  var tlWrap = document.createElement("div");
  tlWrap.id = "gantt-tl-wrap";
  tlWrap.dataset.startDate = YEAR + "-01-01";
  tlWrap.style.cssText = "flex:1;overflow:auto;";

  var tlInner = document.createElement("div");
  tlInner.style.cssText = "width:"+(totalDays*COL_W)+"px;";

  var monthRow = document.createElement("div");
  monthRow.style.cssText = "display:flex;height:28px;background:var(--color-bg);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:10;";
  for(var m=0;m<12;m++){
    var dim = new Date(YEAR, m+1, 0).getDate();
    var mDiv = document.createElement("div");
    mDiv.style.cssText = "width:"+(dim*COL_W)+"px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border-right:2px solid var(--color-border);color:var(--color-text-secondary);";
    mDiv.textContent = MONTH_NAMES[m];
    monthRow.appendChild(mDiv);
  }
  tlInner.appendChild(monthRow);

  var dayRow = document.createElement("div");
  dayRow.style.cssText = "display:flex;height:30px;background:var(--color-bg);border-bottom:2px solid var(--color-border);position:sticky;top:28px;z-index:10;";
  for(var di=0;di<totalDays;di++){
    var d = new Date(yearStart); d.setDate(d.getDate()+di);
    var dStr = fmt(d.getFullYear(),d.getMonth(),d.getDate());
    var dow = d.getDay();
    var dDiv = document.createElement("div");
    dDiv.style.cssText = "width:"+COL_W+"px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;border-right:1px solid var(--color-border);background:"+(dStr===todayStr?"#fff8e1":"");
    dDiv.style.color = dow===0?"var(--sun-color)":dow===6?"var(--sat-color)":"var(--color-text-secondary)";
    dDiv.textContent = d.getDate();
    dayRow.appendChild(dDiv);
  }
  tlInner.appendChild(dayRow);

  var evBody = document.createElement("div");
  evBody.id = "g-ev-body";
  tlInner.appendChild(evBody);

  tlWrap.appendChild(tlInner);
  outer.appendChild(labelWrap);
  outer.appendChild(tlWrap);
  grid.appendChild(outer);

  function getVisibleMonths(scrollLeft, viewWidth){
    var s = Math.max(0, Math.floor(scrollLeft / COL_W));
    var e = Math.min(totalDays-1, Math.ceil((scrollLeft+viewWidth) / COL_W));
    var vis = {};
    for(var i=s;i<=e;i++){
      var dd = new Date(yearStart); dd.setDate(dd.getDate()+i);
      vis[dd.getFullYear()*12+dd.getMonth()] = true;
    }
    return vis;
  }

  function buildRows(visMonths){
    labelBody.innerHTML = "";
    evBody.innerHTML = "";
    tlWrap.__seasonUpdaters = [];
    var groupOrder = Object.keys(CATS).concat(Object.keys(MEMBERS));
    // 시즌은 맨 위, 상품/기타는 맨 아래
    groupOrder = groupOrder.filter(function(k){ return k!=="production"&&k!=="shoot"&&k!=="pattern"&&k!=="prodetc"; });
    groupOrder.unshift("__season__"); // 시즌 맨 위
    groupOrder.push("production","shoot","pattern","__prodetc__"); // 상품+기타 맨 아래
    groupOrder.forEach(function(catKey){
      // 시즌 섹션
      if(catKey === "__season__"){
        var validSeasons = seasonSettings.filter(function(s){ return s.start && s.end; });

        // 레인 배정: 겹치는 시즌을 다른 레인으로
        var lanes = [];
        var laneAssign = [];
        validSeasons.forEach(function(s){
          var si = dayIdx(s.start), ei = dayIdx(s.end);
          var assigned = -1;
          for(var li=0; li<lanes.length; li++){
            var conflict = false;
            for(var ki=0; ki<lanes[li].length; ki++){
              var o = lanes[li][ki];
              if(si <= o.ei && ei >= o.si){ conflict=true; break; }
            }
            if(!conflict){ assigned=li; break; }
          }
          if(assigned===-1){ assigned=lanes.length; lanes.push([]); }
          lanes[assigned].push({si:si, ei:ei, s:s});
          laneAssign.push(assigned);
        });

        var laneCount = Math.max(1, lanes.length);
        var LANE_H = ROW_H;
        var totalH = laneCount * LANE_H;

        // 라벨 — 섹션 헤더 하나 (가변 높이)
        var seasonSh = document.createElement("div");
        seasonSh.style.cssText = "height:"+totalH+"px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:var(--color-text-secondary);";
        seasonSh.textContent = "시즌";
        labelBody.appendChild(seasonSh);

        // 타임라인 — 같은 높이의 컨테이너 하나
        var seasonSht = document.createElement("div");
        seasonSht.style.cssText = "height:"+totalH+"px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);position:relative;";
        if(todayDayIdx>=0&&todayDayIdx<totalDays){
          var tlSeason=document.createElement("div");
          tlSeason.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.2);z-index:0;";
          seasonSht.appendChild(tlSeason);
        }

        validSeasons.forEach(function(s, idx){
          var si2 = Math.max(0, dayIdx(s.start));
          var ei2 = Math.min(totalDays-1, dayIdx(s.end));
          if(si2 > totalDays-1 || ei2 < 0) return;

          var lane = laneAssign[idx];
          var topOffset = lane * LANE_H + Math.round((LANE_H-22)/2);
          var barStartX = si2 * COL_W;
          var barEndX = (ei2+1) * COL_W;

          var bar = document.createElement("div");
          bar.style.cssText = "position:absolute;left:"+barStartX+"px;width:"+(barEndX-barStartX-2)+"px;top:"+topOffset+"px;height:22px;background:"+s.bg+";border-left:3px solid "+s.color+";border-radius:4px;overflow:visible;cursor:pointer;z-index:1;";

          // 텍스트는 별도 span으로, 뷰포트 중앙에 sticky하게
          var txt = document.createElement("span");
          txt.textContent = s.label+"  "+fmtShort(s.start)+"~"+fmtShort(s.end);
          // 배경색 밝기 계산해서 텍스트 색 자동 결정
          function hexLuminance(hex){
            var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return (0.299*r + 0.587*g + 0.114*b);
          }
          var baseColor = hexLuminance(s.bg) > 160 ? "#000" : "#fff";
          txt.style.cssText = "position:absolute;top:50%;transform:translateY(-50%);font-size:15px;font-weight:700;color:"+baseColor+";white-space:nowrap;pointer-events:none;";
          var barW = barEndX - barStartX - 2;
          // rAF 후 텍스트가 바를 넘어가면 검정으로 전환
          tlWrap.__seasonUpdaters = tlWrap.__seasonUpdaters || [];
          tlWrap.__seasonUpdaters.push(function(){
            if(txt.offsetWidth > barW){
              txt.style.color = "#000";
            } else {
              txt.style.color = baseColor;
            }
          });
          bar.appendChild(txt);
          bar.addEventListener("click", function(){ openSingleSeasonModal(s); });
          seasonSht.appendChild(bar);

          // 텍스트 위치를 뷰포트 기준 중앙으로 업데이트하는 함수
          function updateTxtPos(){
            var scrollLeft = tlWrap.scrollLeft;
            var viewW = tlWrap.offsetWidth;
            var visLeft = Math.max(barStartX, scrollLeft);
            var visRight = Math.min(barEndX, scrollLeft + viewW);
            if(visLeft >= visRight){ txt.style.left="0px"; return; }
            var visCenter = (visLeft + visRight) / 2;
            var txtLeft = visCenter - barStartX - txt.offsetWidth/2;
            // 바 안에서 벗어나지 않도록 클램프
            txtLeft = Math.max(6, Math.min(txtLeft, barEndX - barStartX - txt.offsetWidth - 6));
            txt.style.left = txtLeft + "px";
          }
          tlWrap.__seasonUpdaters = tlWrap.__seasonUpdaters || [];
          tlWrap.__seasonUpdaters.push(updateTxtPos);
        });

        // 빈 영역 클릭 → 해당 날짜로 새 시즌 추가
        seasonSht.addEventListener("click", function(e){
          if(e.target !== seasonSht) return; // 바 클릭은 제외
          var rect = seasonSht.getBoundingClientRect();
          var clickX = e.clientX - rect.left + (tlWrap.scrollLeft - (seasonSht.getBoundingClientRect().left - tlWrap.getBoundingClientRect().left + tlWrap.scrollLeft));
          var clickedDayIdx = Math.floor(e.offsetX / COL_W);
          var clickedDate = new Date(YEAR, 0, 1 + clickedDayIdx);
          var yyyy = clickedDate.getFullYear();
          var mm = String(clickedDate.getMonth()+1).padStart(2,"0");
          var dd = String(clickedDate.getDate()).padStart(2,"0");
          var startStr = yyyy+"-"+mm+"-"+dd;
          // 기본 종료일은 시작일 + 6개월
          var endDate = new Date(clickedDate);
          endDate.setMonth(endDate.getMonth()+6);
          endDate.setDate(endDate.getDate()-1);
          var ey = endDate.getFullYear(), em = String(endDate.getMonth()+1).padStart(2,"0"), ed = String(endDate.getDate()).padStart(2,"0");
          var endStr = ey+"-"+em+"-"+ed;
          // 새 시즌 객체 생성
          var colorList = ["#AD1457","#E65100","#4527A0","#006064","#558B2F","#1565C0","#6D4C41","#283593","#00695C","#827717"];
          var bgList    = ["#F06292","#FFA726","#9575CD","#4DD0E1","#AED581","#64B5F6","#A1887F","#7986CB","#4DB6AC","#D4E157"];
          var ci = seasonSettings.length % colorList.length;
          var newSeason = { id:"pi_"+Date.now(), label:"새 시즌", color:colorList[ci], bg:bgList[ci], start:startStr, end:endStr };
          seasonSettings.push(newSeason);
          openSingleSeasonModal(newSeason);
        });

        evBody.appendChild(seasonSht);
        return;
      }

      // 기타 섹션 (개별 행으로 표시)
      if(catKey === "__prodetc__"){
        var prodetcEvs = events.filter(function(e){
          if(e.category!=="prodetc") return false;
          if(RECUR.indexOf(e.item)!==-1) return false;
          var es=e.date, ee=getEventDateEnd(e)||e.date;
          var sm=parseInt(es.substring(0,4))*12+parseInt(es.substring(5,7))-1;
          var em=parseInt(ee.substring(0,4))*12+parseInt(ee.substring(5,7))-1;
          for(var vm=sm;vm<=em;vm++){ if(visMonths[vm]) return true; }
          return false;
        });
        if(prodetcEvs.length===0) return;
        var pci = CATS["prodetc"];
        var psh=document.createElement("div");
        psh.style.cssText="height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:var(--color-text-secondary);";
        psh.textContent="기타(상품)"; labelBody.appendChild(psh);
        var psht=document.createElement("div");
        psht.style.cssText="height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);position:relative;";
        if(todayDayIdx>=0&&todayDayIdx<totalDays){
          var tlp=document.createElement("div"); tlp.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.15);";
          psht.appendChild(tlp);
        }
        evBody.appendChild(psht);
        prodetcEvs.forEach(function(ev){
          var es=ev.date, ee=getEventDateEnd(ev)||ev.date;
          var si=Math.max(0,dayIdx(es)), ei=Math.min(totalDays-1,dayIdx(ee));
          if(si>totalDays-1||ei<0) return;
          var txt=getCalDisplayText(ev)+"  "+fmtShort(es)+(ee!==es?"~"+fmtShort(ee):"");
          var lr=document.createElement("div");
          lr.style.cssText="height:"+ROW_H+"px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;border-bottom:1px solid var(--color-border);border-left:3px solid "+pci.color+";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:var(--color-bg);";
          lr.textContent=getCalDisplayText(ev); lr.title=txt;
          lr.addEventListener("click",function(){ switchToCalendar(es); });
          labelBody.appendChild(lr);
          var tr=document.createElement("div");
          tr.style.cssText="height:"+ROW_H+"px;position:relative;border-bottom:1px solid var(--color-border);";
          if(todayDayIdx>=0&&todayDayIdx<totalDays){
            var tl2=document.createElement("div"); tl2.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.1);z-index:0;";
            tr.appendChild(tl2);
          }
          var bar=document.createElement("div");
          bar.style.cssText="position:absolute;left:"+(si*COL_W)+"px;width:"+((ei-si+1)*COL_W-4)+"px;top:5px;bottom:5px;background:"+pci.bg+";border-left:3px solid "+pci.color+";border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:"+pci.text+";white-space:nowrap;overflow:visible;cursor:pointer;z-index:1;";
          bar.textContent=txt;
          bar.addEventListener("click",function(){ switchToCalendar(es); });
          tr.appendChild(bar);
          evBody.appendChild(tr);
        });
        return;
      }

      var ci = CATS[catKey]||MEMBERS[catKey]; if(!ci) return;
      var catEvs = events.filter(function(e){
        if(e.category!==catKey) return false;
        if(RECUR.indexOf(e.item)!==-1) return false;
        var es = e.date, ee = getEventDateEnd(e)||e.date;
        var sm = parseInt(es.substring(0,4))*12+parseInt(es.substring(5,7))-1;
        var em = parseInt(ee.substring(0,4))*12+parseInt(ee.substring(5,7))-1;
        for(var vm=sm;vm<=em;vm++){ if(visMonths[vm]) return true; }
        return false;
      });
      if(catEvs.length===0) return;

      // 기타 섹션 (개별 행으로 표시) - 중복 제거됨

      if(catKey==="production"||catKey==="shoot"||catKey==="pattern"){
        if(catKey!=="production") return;

        // 섹션 헤더
        var sh = document.createElement("div");
        sh.style.cssText = "height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";
        sh.textContent = "상품 (메인 · 샘플 · 패턴)";
        labelBody.appendChild(sh);
        var sht = document.createElement("div");
        sht.style.cssText = "height:24px;background:var(--color-bg-secondary);border-bottom:1px solid var(--color-border);position:relative;";
        if(todayDayIdx>=0&&todayDayIdx<totalDays){
          var tl=document.createElement("div"); tl.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.15);";
          sht.appendChild(tl);
        }
        evBody.appendChild(sht);

        var allProdEvs = events.filter(function(e){
          if(e.category!=="production"&&e.category!=="shoot"&&e.category!=="pattern") return false;
          if(RECUR.indexOf(e.item)!==-1) return false;
          var es=e.date, ee=getEventDateEnd(e)||e.date;
          var sm=parseInt(es.substring(0,4))*12+parseInt(es.substring(5,7))-1;
          var em=parseInt(ee.substring(0,4))*12+parseInt(ee.substring(5,7))-1;
          for(var vm=sm;vm<=em;vm++){ if(visMonths[vm]) return true; }
          return false;
        });
        if(allProdEvs.length===0) return;

        // 아이템명으로 그룹핑 → 각 그룹 안에서 카테고리+차수별 바 목록 수집
        var itemMap = {};
        allProdEvs.forEach(function(ev){
          var ik = (ev.item||"").trim().toLowerCase();
          if(!itemMap[ik]) itemMap[ik] = { item: ev.item||"", season:"", bars:[] };
          var s = parseProdSeason(ev.description||"")||"";
          if(!itemMap[ik].season && s) itemMap[ik].season = s;

          var ord = parseProdOrder(ev.description||"")||"";
          var bk = ev.category+"|"+ord;
          var existing = null;
          itemMap[ik].bars.forEach(function(b){ if(b.key===bk) existing=b; });
          if(!existing){
            existing = { key:bk, category:ev.category, order:ord, company:ev.company||"", instrEv:null, expEv:null, compEv:null };
            itemMap[ik].bars.push(existing);
          }
          if(ev.stage==="instruct") existing.instrEv=ev;
          else if(ev.stage==="expected"||ev.stage==="expected_p") existing.expEv=ev;
          else if(ev.stage==="completed"||ev.stage==="completed_p") existing.compEv=ev;
          if(!existing.company && ev.company) existing.company=ev.company;
        });

        // 시즌→아이템명 정렬
        var CAT_ORDER = {production:0, shoot:1, pattern:2};
        var sortedItems = Object.keys(itemMap).sort(function(a,b){
          var ga=itemMap[a], gb=itemMap[b];
          var sa=ga.season||"ZZ", sb=gb.season||"ZZ";
          if(sa!==sb) return sa<sb?-1:1;
          return a<b?-1:1;
        });

        var BAR_H = 20, BAR_GAP = 3, ROW_PAD = 4;

        sortedItems.forEach(function(ik){
          var grp = itemMap[ik];
          // 바 정렬: 카테고리→차수
          grp.bars.sort(function(a,b){
            var ca=CAT_ORDER[a.category]||0, cb=CAT_ORDER[b.category]||0;
            if(ca!==cb) return ca-cb;
            return (a.order||"")<(b.order||"")?-1:1;
          });

          var rowH = ROW_PAD*2 + grp.bars.length*(BAR_H+BAR_GAP) - BAR_GAP;
          rowH = Math.max(rowH, ROW_H);

          var seasonPfx = grp.season?"["+grp.season+"] ":"";
          var labelTxt = seasonPfx+grp.item;

          var allDates = [];
          grp.bars.forEach(function(b){
            if(b.instrEv) allDates.push(b.instrEv.date);
            if(b.expEv) allDates.push(b.expEv.date);
            if(b.compEv) allDates.push(b.compEv.date);
          });
          if(allDates.length===0) return;
          allDates.sort();
          var minDate = allDates[0];

          var lr=document.createElement("div");
          lr.style.cssText="height:"+rowH+"px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;border-bottom:1px solid var(--color-border);border-left:3px solid var(--color-border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:var(--color-bg);";
          lr.textContent=labelTxt; lr.title=labelTxt;
          lr.addEventListener("click",function(){ switchToCalendar(minDate); });
          labelBody.appendChild(lr);

          var tr=document.createElement("div");
          tr.style.cssText="height:"+rowH+"px;position:relative;border-bottom:1px solid var(--color-border);";
          if(todayDayIdx>=0&&todayDayIdx<totalDays){
            var tl2=document.createElement("div"); tl2.style.cssText="position:absolute;left:"+(todayDayIdx*COL_W+COL_W/2)+"px;top:0;bottom:0;width:1px;background:rgba(26,26,24,0.1);z-index:0;";
            tr.appendChild(tl2);
          }

          grp.bars.forEach(function(b, bi){
            var cinfo = CATS[b.category];
            var startEv = b.instrEv || b.expEv || b.compEv;
            var endEv = b.compEv || b.expEv || b.instrEv;
            if(!startEv) return;

            var si=Math.max(0,dayIdx(startEv.date));
            var ei=Math.min(totalDays-1,dayIdx(endEv.date));
            if(si>totalDays-1||ei<0) return;

            var rawOrd=b.order, dispOrd=rawOrd?(/^\d+$/.test(rawOrd)?rawOrd+"차":rawOrd):"";
            var catLbl=b.category==="production"?"메인":b.category==="shoot"?"샘플":"패턴";
            var barTxt=(dispOrd?dispOrd+" ":"")+catLbl+(b.company?" · "+b.company:"")+"  "+fmtShort(startEv.date)+"~"+fmtShort(endEv.date);

            var topOffset = ROW_PAD + bi*(BAR_H+BAR_GAP);

            var bar=document.createElement("div");
            bar.style.cssText="position:absolute;left:"+(si*COL_W)+"px;top:"+topOffset+"px;height:"+BAR_H+"px;min-width:"+((ei-si+1)*COL_W-4)+"px;background:"+cinfo.bg+";border-left:3px solid "+cinfo.color+";border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:700;color:"+cinfo.text+";white-space:nowrap;overflow:visible;cursor:pointer;z-index:1;";
            bar.textContent=barTxt; bar.title=barTxt;
            bar.addEventListener("click",function(){ switchToCalendar(startEv.date); });
            tr.appendChild(bar);

            // 끝점 dot
            var dot=document.createElement("div");
            dot.style.cssText="position:absolute;left:"+((ei+1)*COL_W-8)+"px;top:"+(topOffset+BAR_H/2-4)+"px;width:8px;height:8px;border-radius:50%;background:"+cinfo.color+";border:2px solid #fff;z-index:3;pointer-events:none;";
            tr.appendChild(dot);
          });

          evBody.appendChild(tr);
        });
        return;
      }

      // 나머지 카테고리 섹션 헤더
      var sh2 = document.createElement("div");

function deduplicateProdItems(){
  // 소문자 기준 중복 제거 — 원가데이터 있는 항목 우선, 그 다음 먼저 나온 것 유지
  var seen = {};
  prodItems = prodItems.filter(function(p){
    var key = (p.name||"").trim().toLowerCase();
    if(!key) return false;
    if(seen[key]){
      // 현재 항목에 원가데이터가 있고 기존에 없으면 id 교체
      if(costDataMap[p.id] && !costDataMap[seen[key].id]){
        seen[key].id = p.id;
        if(p.season && !seen[key].season) seen[key].season = p.season;
      }
      return false;
    }
    seen[key] = p;
    return true;
  });
  saveProdItemsLocal();
}
function saveProdItemsLocal(){
  try { localStorage.setItem(PROD_ITEMS_CACHE_KEY, JSON.stringify(prodItems)); } catch(e){}
}
function sortProdItemsRecentFirst(){
  prodItems.sort(function(a,b){
    var ta = parseInt(String(a.id).replace(/\D/g,"")) || 0;
    var tb = parseInt(String(b.id).replace(/\D/g,"")) || 0;
    return tb - ta;
  });
}
function autoSyncProdItemsFromCalendar(){
  var PROD_AUTO_CATS = ["production","shoot","pattern"];
  var existingNames = {};
  prodItems.forEach(function(p){ existingNames[p.name.trim().toLowerCase()] = p; });

  var seenInThisRun = {};
  var toAdd = [];
  var updated = false;

  events.forEach(function(e){
    if(PROD_AUTO_CATS.indexOf(e.category) === -1) return;
    var name = (e.item || "").trim();
    if(!name) return;
    var nameKey = name.toLowerCase();
    if(seenInThisRun[nameKey]) return;
    seenInThisRun[nameKey] = true;

    var season = getItemSeason(e) || "";

    if(existingNames[nameKey]){
      // 이미 있지만 시즌이 없으면 업데이트
      var existing = existingNames[nameKey];
      if(!existing.season && season){
        existing.season = season;
        updated = true;
        apiPost({action:"createProdItem", data:existing}).catch(function(){});
      }
      return;
    }

    toAdd.push({ id: "pi_"+Date.now()+"_"+Math.floor(Math.random()*10000), name: name, season: season });
  });

  if(updated) saveProdItemsLocal();
  if(toAdd.length === 0) return;

  // 최신순 유지: 역순으로 unshift해야 첫 번째 항목이 최종적으로 맨 위에 위치
  toAdd.reverse().forEach(function(newItem){
    prodItems.unshift(newItem);
    apiPost({action:"createProdItem", data:newItem}).then(function(res){
      if(res && res.id){ newItem.id = res.id; saveProdItemsLocal(); }
    }).catch(function(){});
  });
  saveProdItemsLocal();
}

function loadProdItems(){
  loadProdItemsLocal();

    if(data && Array.isArray(data.items) && data.items.length > 0){
      // 로컬에 있는 memoLog/memo/order 보존 (서버에는 없음)
      var localMap = {};
      prodItems.forEach(function(p){ localMap[p.id] = p; });
      prodItems = data.items.map(function(item){
        var local = localMap[item.id];
        if(local){
          if(local.memoLog && local.memoLog.length > 0) item.memoLog = local.memoLog;
          if(local.memo) item.memo = local.memo;
        }
        return item;
      });
      sortProdItemsRecentFirst();
      saveProdItemsLocal();
    }
  }).catch(function(){ });
}

function getLinkedEvents(itemId, type){
  var ids = getLinkedIds(itemId, type);
  var evs = events.filter(function(e){ return ids.indexOf(String(e.id)) !== -1; });
  evs.sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  return evs;
}

function getProdStatusForItem(itemName){
  // 패턴/샘플/메인/입고예정/입고완료 모두 아이템명 기준 자동 매칭
  var result = { pattern:[], shoot:[], main:[], expected:[], completed:[] };
  events.forEach(function(e){
    if((e.item||"").trim().toLowerCase() !== itemName.trim().toLowerCase()) return;
    if(e.category==="pattern" && e.stage==="instruct") result.pattern.push(e);
    if(e.category==="shoot" && e.stage==="instruct") result.shoot.push(e);
    if(e.category==="production"){
      if(e.stage==="instruct") result.main.push(e);
      if(e.stage==="expected"||e.stage==="expected_p") result.expected.push(e);
      if(e.stage==="completed"||e.stage==="completed_p") result.completed.push(e);
    }
  });
  Object.keys(result).forEach(function(k){
    result[k].sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  });
  return result;
}

function findRelatedStageEvent(baseEv, stages){
  // 같은 카테고리/업체명/아이템명 + 투입일(baseEv.date) 이후 날짜인 이벤트만 탐색
  var found = events.filter(function(e){
    if(e.category !== baseEv.category) return false;
    if((e.company||"") !== (baseEv.company||"")) return false;
    if((e.item||"").trim().toLowerCase() !== (baseEv.item||"").trim().toLowerCase()) return false;
    if(e.date < baseEv.date) return false; // 투입일보다 이전 날짜는 제외
    return stages.indexOf(e.stage) !== -1;
  }).sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  return found.length ? found[0] : null;
}

function buildAutoStatusCell(evList){
  var wrap = document.createElement("div");
  if(!evList || evList.length === 0){
    wrap.innerHTML = '<span style="color:var(--color-text-tertiary);">-</span>';
    return wrap;
  }

  // 투입일을 날짜 오름차순으로 정렬 (오래된 것부터 차례로 처리)
  var sorted = evList.slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });

  // 같은 카테고리+아이템명의 예정/완료 이벤트 전체를 날짜 오름차순으로 준비
  var baseEv = sorted[0];
  var allExpected = events.filter(function(e){
    if(e.category !== baseEv.category) return false;
    if((e.item||"").trim().toLowerCase() !== (baseEv.item||"").trim().toLowerCase()) return false;
    if(e.stage!=="expected"&&e.stage!=="expected_p"&&e.stage!=="completed"&&e.stage!=="completed_p") return false;
    return true;
  }).sort(function(a,b){ return a.date < b.date ? -1 : 1; });

  var usedIds = {};

  sorted.forEach(function(ev){
    var row = document.createElement("div"); row.className = "prod-status-cell";
    var label = fmtShort(ev.date);
    var evOrder = parseProdOrder(ev.description||""); // 이 투입일의 차수

    // 이 투입일 이후이면서 차수/업체명 일치하고 아직 사용 안 된 예정/완료 찾기
    var matchedCompleted = null, matchedExpected = null;
    for(var i=0; i<allExpected.length; i++){
      var e = allExpected[i];
      if(usedIds[e.id]) continue;
      if(e.date < ev.date) continue;
      // 차수 일치 확인: 투입일에 차수가 있으면 예정일도 반드시 같은 차수여야 함
      var eOrder = parseProdOrder(e.description||"");
      var orderMatch = !evOrder ? true : (evOrder === eOrder);
      if(!orderMatch) continue;
      var companyMatch = !ev.company || !e.company || (e.company||"").toLowerCase() === (ev.company||"").toLowerCase();
      if(!companyMatch) continue;
      if((e.stage==="expected"||e.stage==="expected_p") && !matchedExpected) matchedExpected = e;
      if(e.stage==="completed"||e.stage==="completed_p"){ matchedCompleted = e; break; }
    }

    // 예정일이 있으면 그에 대응하는 완료일을 예정일 이후에서 탐색
    if(matchedExpected && !matchedCompleted){
      for(var j=0; j<allExpected.length; j++){
        var ec = allExpected[j];
        if(usedIds[ec.id]) continue;
        if(ec.date < matchedExpected.date) continue;
        var ecOrder = parseProdOrder(ec.description||"");
        var orderMatch2 = !evOrder ? true : (evOrder === ecOrder);
        if(!orderMatch2) continue;
        var companyMatch2 = !ev.company || !ec.company || (ec.company||"").toLowerCase() === (ev.company||"").toLowerCase();
        if(!companyMatch2) continue;
        if(ec.stage==="completed"||ec.stage==="completed_p"){ matchedCompleted = ec; break; }
      }
    }

    // 완료보다 예정이 더 가까우면 예정 우선
    if(matchedCompleted && matchedExpected && matchedExpected.date <= matchedCompleted.date){
      matchedCompleted = null;
    }

    if(matchedCompleted){
      label = fmtShort(ev.date) + " ~ " + fmtShort(matchedCompleted.date) + "(완료)";
      row.style.textDecoration = "line-through";
      row.style.color = "var(--color-text-tertiary)";
      // 예정+완료 세트를 함께 사용 처리 (다른 투입일이 가져가지 못하게)
      if(matchedExpected) usedIds[matchedExpected.id] = true;
      usedIds[matchedCompleted.id] = true;
    } else if(matchedExpected){
      label = fmtShort(ev.date) + " ~ " + fmtShort(matchedExpected.date) + "(예정)";
      usedIds[matchedExpected.id] = true;
    }

    var companyPfx = ev.company ? (ev.company + " ") : "";
    row.textContent = companyPfx + label;
    // 메인(production) 카테고리면 클릭 시 발주수량표 팝업
    if(ev.category === "production"){
      row.style.cursor = "pointer";
      row.style.textDecoration = (row.style.textDecoration || "") + (matchedCompleted ? " line-through" : "");
      row.title = "클릭하면 발주수량표 보기";
      (function(clickEv){ row.addEventListener("click", function(){ openOrderQtyModal(clickEv); }); })(ev);
    }
    wrap.appendChild(row);
  });

  return wrap;
}

function openOrderQtyModal(ev){
  var variants = parseVariants(ev.variants);
  var modalRoot = document.getElementById("modal-root");
  modalRoot.innerHTML = "";
  var overlay = document.createElement("div"); overlay.className = "modal-overlay";
  var modal = document.createElement("div"); modal.className = "cost-modal"; modal.style.maxWidth = "560px";
  overlay.appendChild(modal);
  overlay.addEventListener("click", function(e){ if(e.target===overlay) modalRoot.innerHTML=""; });

  var h2 = document.createElement("h2");
  h2.textContent = (ev._title || "발주수량표") + " - " + (ev.item||"") + (ev.company ? " · "+ev.company : "");
  modal.appendChild(h2);

  var meta = document.createElement("div");
  meta.style.cssText = "font-size:13px;color:var(--color-text-secondary);margin-bottom:14px;";
  var seasonDisplay = parseProdSeason(ev.description||"") || "";
  var orderDisplay = parseProdOrder(ev.description||"") || "";
  var metaParts = ["투입일: " + fmtDateKorean(ev.date)];
  if(seasonDisplay) metaParts.push("시즌: " + seasonDisplay);
  if(orderDisplay) metaParts.push("차수: " + orderDisplay);
  meta.textContent = metaParts.join(" · ");
  modal.appendChild(meta);

  if(!ev.variants || variants.length===0 || !variants[0].color && !variants[0].size){
    var empty = document.createElement("div"); empty.className="panel-subtitle";
    empty.textContent="등록된 옵션 데이터가 없습니다."; modal.appendChild(empty);
  } else {
    var colorRows = variants.filter(function(v){ return v.type!=="size" && v.color; });
    var sizeRows = variants.filter(function(v){ return v.type==="size"; });
    var hasSizeType = sizeRows.length > 0;

    // 컬러 목록
    var colors = colorRows.map(function(v){ return v.color; }).filter(function(c,i,a){ return a.indexOf(c)===i; });

    // 사이즈 목록: type=color의 size + type=size의 size 모두 수집 (중복 제거, 순서 유지)
    var sizesFromColor = colorRows.map(function(v){ return v.size; }).filter(function(s){ return !!s; });
    var sizesFromSize = sizeRows.map(function(v){ return v.size; }).filter(function(s){ return !!s; });
    var allSizes = sizesFromColor.concat(sizesFromSize);
    var sizes = allSizes.filter(function(s,i,a){ return a.indexOf(s)===i; });

    // qty 조회: type=color에서 먼저 찾고, 없으면 type=size에서 찾기
    function getQty(color, size){
      var r1 = colorRows.filter(function(v){ return v.color===color && v.size===size; });
      if(r1.length > 0) return parseInt(r1[0].qty)||0;
      var r2 = sizeRows.filter(function(v){ return v.parentColor===color && v.size===size; });
      if(r2.length > 0) return parseInt(r2[0].qty)||0;
      return 0;
    }

    if(colors.length > 0 && sizes.length > 0){
      var table = document.createElement("table");
      table.style.cssText = "width:100%;border-collapse:collapse;margin-bottom:14px;";

      var thead = document.createElement("thead"); var trh = document.createElement("tr");
      var thEmpty = document.createElement("th"); thEmpty.style.cssText="background:var(--color-bg-tertiary);border:1px solid var(--color-border);padding:7px 10px;font-size:13px;"; trh.appendChild(thEmpty);
      sizes.forEach(function(s){
        var th = document.createElement("th"); th.textContent = s||"-";
        th.style.cssText="background:var(--color-bg-tertiary);border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;min-width:50px;";
        trh.appendChild(th);
      });
      var thTotal = document.createElement("th"); thTotal.textContent="합계";
      thTotal.style.cssText="background:var(--color-bg-secondary);border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;";
      trh.appendChild(thTotal);
      thead.appendChild(trh); table.appendChild(thead);

      var tbody = document.createElement("tbody");
      var colTotals = {}; var grandTotal = 0;
      sizes.forEach(function(s){ colTotals[s]=0; });

      colors.forEach(function(color){
        var tr = document.createElement("tr");
        var tdColor = document.createElement("td"); tdColor.textContent = color;
        tdColor.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:600;background:var(--color-bg-secondary);white-space:nowrap;";
        tr.appendChild(tdColor);
        var rowTotal = 0;
        sizes.forEach(function(size){
          var qty = getQty(color, size);
          colTotals[size] = (colTotals[size]||0) + qty;
          rowTotal += qty; grandTotal += qty;
          var td = document.createElement("td"); td.textContent = qty > 0 ? qty : "-";
          td.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;text-align:center;"+(qty>0?"font-weight:500;":"color:var(--color-text-tertiary);");
          tr.appendChild(td);
        });
        var tdRowTotal = document.createElement("td"); tdRowTotal.textContent = rowTotal;
        tdRowTotal.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;background:var(--color-bg-secondary);";
        tr.appendChild(tdRowTotal);
        tbody.appendChild(tr);
      });

      var trTotal = document.createElement("tr");
      var tdTotalLabel = document.createElement("td"); tdTotalLabel.textContent="합계";
      tdTotalLabel.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;background:var(--color-bg-secondary);";
      trTotal.appendChild(tdTotalLabel);
      sizes.forEach(function(s){
        var td = document.createElement("td"); td.textContent = colTotals[s]||0;
        td.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;background:var(--color-bg-secondary);";
        trTotal.appendChild(td);
      });
      var tdGrand = document.createElement("td"); tdGrand.textContent = grandTotal;
      tdGrand.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:14px;font-weight:700;text-align:center;background:var(--color-bg-tertiary);";
      trTotal.appendChild(tdGrand);
      tbody.appendChild(trTotal);
      table.appendChild(tbody);
      modal.appendChild(table);
    } else {
      // 사이즈 구분 없는 단순 컬러 목록
      var table2 = document.createElement("table");
      table2.style.cssText="width:100%;border-collapse:collapse;margin-bottom:14px;";
      var thead2 = document.createElement("thead"); var trh2 = document.createElement("tr");
      ["컬러","수량"].forEach(function(h){ var th=document.createElement("th"); th.textContent=h; th.style.cssText="background:var(--color-bg-tertiary);border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;"; trh2.appendChild(th); });
      thead2.appendChild(trh2); table2.appendChild(thead2);
      var tbody2 = document.createElement("tbody"); var grandTotal2=0;
      colorRows.forEach(function(v){
        var tr=document.createElement("tr");
        var td1=document.createElement("td"); td1.textContent=v.color||"-"; td1.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:600;background:var(--color-bg-secondary);";
        var td2=document.createElement("td"); td2.textContent=v.qty||"-"; td2.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;text-align:center;";
        grandTotal2 += parseInt(v.qty)||0;
        tr.appendChild(td1); tr.appendChild(td2); tbody2.appendChild(tr);
      });
      var trTot=document.createElement("tr");
      var tdL=document.createElement("td"); tdL.textContent="합계"; tdL.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;background:var(--color-bg-secondary);";
      var tdR=document.createElement("td"); tdR.textContent=grandTotal2; tdR.style.cssText="border:1px solid var(--color-border);padding:7px 10px;font-size:13px;font-weight:700;text-align:center;background:var(--color-bg-secondary);";
      trTot.appendChild(tdL); trTot.appendChild(tdR); tbody2.appendChild(trTot);
      table2.appendChild(tbody2); modal.appendChild(table2);
    }
  }

  var btnRow = document.createElement("div"); btnRow.className="cost-modal-btnrow";
  var closeBtn = document.createElement("button"); closeBtn.textContent="닫기";
  closeBtn.addEventListener("click", function(){ modalRoot.innerHTML=""; });
  btnRow.appendChild(closeBtn); modal.appendChild(btnRow);
  modalRoot.appendChild(overlay);
}

function openLinkPicker(item, type){

    if(e.category !== targetCat) return false;

  var listWrap = document.createElement("div"); listWrap.style.cssText = "max-height:50vh;overflow-y:auto;margin-bottom:14px;";
  if(candidateEvents.length === 0){
    var empty = document.createElement("div"); empty.className = "panel-subtitle"; empty.textContent = "'" + item.name + "' 이름으로 등록된 " + labelMap[type] + " 일정이 없습니다.";
    listWrap.appendChild(empty);
  } else {
    candidateEvents.forEach(function(ev){
      var row = document.createElement("label");
      row.style.cssText = "display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--color-border);cursor:pointer;";
      var cb = document.createElement("input"); cb.type = "checkbox";
      cb.checked = selectedIds.indexOf(String(ev.id)) !== -1;
      cb.addEventListener("change", function(){
        var idStr = String(ev.id);
